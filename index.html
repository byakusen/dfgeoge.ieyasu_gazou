<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家康くん 〜戦国ものしり問答〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#13160f;       /* 墨（深緑がかった黒） */
    --sumi2:#1c2116;
    --kin:#c9a84a;        /* 金 */
    --kin-akarui:#ecd27e;
    --aoi:#5c8a52;        /* 葵の緑 */
    --aoi-fuka:#3a5c34;   /* 深緑 */
    --aka:#9c4632;        /* 朱（落ち着いた） */
    --aka-fuka:#6e2f20;
    --washi:#f4ead6;      /* 和紙 */
    --washi-kage:#e7d8ba;
    --sumi-usu:rgba(244,234,214,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #28341f 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #1b2414 0%, transparent 55%),
      var(--sumi);
    color:var(--washi);
    min-height:100%;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }
  /* 和紙テクスチャ風のノイズ */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    pointer-events:none;z-index:0;
  }

  /* ヘッダー（のぼり旗風） */
  header{
    position:relative;z-index:2;
    text-align:center;
    padding:18px 16px 10px;
    border-bottom:3px solid var(--kin);
    background:linear-gradient(180deg, rgba(58,92,52,.4), transparent);
  }
  .mon{
    display:inline-flex;align-items:center;gap:14px;
  }
  .mon-maru{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--kin);
    display:grid;place-items:center;
    font-family:'Yuji Syuku',serif;font-size:24px;color:var(--kin-akarui);
    background:radial-gradient(circle,#28341f,#13160f);
  }
  h1{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(28px,4.2vw,52px);
    color:var(--kin-akarui);
    letter-spacing:.12em;
    text-shadow:0 2px 0 #000,0 0 18px rgba(201,168,74,.35);
  }
  .sub{
    font-size:clamp(13px,1.5vw,18px);
    color:var(--sumi-usu);
    margin-top:4px;letter-spacing:.18em;
  }

  /* メイン舞台 */
  main{
    position:relative;z-index:2;
    flex:1;
    width:min(1100px,94vw);
    margin:0 auto;
    padding:22px 0 30px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* 家康の語り場 */
  .stage{
    display:flex;align-items:flex-start;gap:22px;
  }
  .ieyasu{
    flex:0 0 auto;
    width:clamp(120px,15vw,180px);
    text-align:center;
  }
  .face{
    width:clamp(120px,15vw,180px);
    height:clamp(120px,15vw,180px);
    border-radius:50%;
    overflow:hidden;
    background:#1c2116;
    border:5px solid var(--kin);
    box-shadow:0 0 0 4px var(--sumi),0 10px 30px rgba(0,0,0,.5);
    position:relative;
    transition:transform .25s;
  }
  /* 口パク：閉じ口と開き口を同じ位置にぴったり重ねる
     （揺れ防止：位置・大きさを固定し、opacityだけを切り替える。src差し替えやtransformは使わない） */
  .face .mouth{
    position:absolute;
    inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .face .mouth.closed{ z-index:1; }            /* 閉じ口：いつも見える（下） */
  .face .mouth.open{ z-index:2; opacity:0; }   /* 開き口：ふだん透明（上に重ねる） */
  .face.talking-open .mouth.open{ opacity:1; } /* talking-openの瞬間だけ開き口を表示 */
  .face.no-img .mouth{ display:none; }
  .face-fallback{
    display:none;
    position:absolute;inset:0;z-index:3;
    width:100%;height:100%;
    align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;
    font-size:clamp(20px,2.6vw,32px);line-height:1.15;
    color:var(--kin-akarui);letter-spacing:.05em;
    background:radial-gradient(circle at 50% 38%, #28341f, #13160f);
  }
  .face.no-img .face-fallback{display:flex;}
  /* （しゃべり時の縦揺れ nod は廃止し、口パクに置き換えました） */
  @keyframes nod{0%,100%{transform:translateY(0)}30%{transform:translateY(6px) rotate(-2deg)}60%{transform:translateY(0) rotate(2deg)}}
  .name-tag{
    margin-top:10px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,24px);color:var(--kin-akarui);letter-spacing:.1em;
  }

  /* 吹き出し（巻物風） */
  .scroll{
    flex:1;position:relative;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);
    border-radius:14px;
    padding:26px 30px;
    min-height:170px;
    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 3px rgba(58,92,52,.3);
    border:2px solid var(--kin);
  }
  .scroll::before{ /* 吹き出しのしっぽ */
    content:"";position:absolute;left:-18px;top:48px;
    border-style:solid;border-width:14px 18px 14px 0;
    border-color:transparent var(--kin) transparent transparent;
  }
  .scroll .answer{
    font-family:'Klee One',serif;
    font-size:clamp(20px,2.6vw,32px);
    line-height:1.75;font-weight:600;
    letter-spacing:.02em;
  }
  .scroll .answer .em{color:var(--aoi-fuka);font-weight:700;}
  .cursor{display:inline-block;width:.5em;background:var(--aoi);animation:blink .7s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}

  /* 質問エリア */
  .ask-zone{
    background:rgba(28,33,22,.7);
    border:2px solid var(--kin);
    border-radius:14px;
    padding:18px 20px;
  }
  .ask-zone .label{
    font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);
    margin-bottom:12px;letter-spacing:.1em;font-weight:700;
  }
  .input-row{display:flex;gap:12px;flex-wrap:wrap;}
  #q,#sq{
    flex:1;min-width:220px;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:clamp(18px,2.2vw,26px);font-weight:500;
    padding:14px 18px;border-radius:10px;border:none;
    background:var(--washi);color:var(--sumi);
  }
  #q:focus,#sq:focus{outline:3px solid var(--kin-akarui);}
  .btn-ask{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(18px,2.2vw,26px);
    padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aoi),var(--aoi-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #25401f,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-ask:active{transform:translateY(4px);box-shadow:0 1px 0 #25401f;}

  /* ===== モード切り替え（のれん風タブ） ===== */
  .mode-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
  .mode-btn{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(15px,1.9vw,22px);letter-spacing:.1em;
    padding:10px 22px;border-radius:10px 10px 0 0;cursor:pointer;
    background:rgba(28,33,22,.55);
    color:var(--sumi-usu);
    border:2px solid rgba(201,168,74,.35);border-bottom:none;
    transition:all .15s;
  }
  .mode-btn:hover{color:var(--kin-akarui);}
  .mode-btn.active{
    background:linear-gradient(180deg,var(--aoi),var(--aoi-fuka));
    color:var(--washi);border-color:var(--kin);
    box-shadow:0 -3px 12px rgba(92,138,82,.4);
  }
  .panel{display:none;}
  .panel.show{display:block;}

  /* 顔のリアクション */
  .face.seikai{animation:nod .6s ease;box-shadow:0 0 0 4px var(--sumi),0 0 34px 6px rgba(201,168,74,.85),0 10px 30px rgba(0,0,0,.5);}
  .face.zannen{animation:shake .5s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px) rotate(-2deg)}40%{transform:translateX(7px) rotate(2deg)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

  /* ===== クイズ ===== */
  .quiz-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-bottom:14px;flex-wrap:wrap;
  }
  .quiz-count{font-family:'Yuji Syuku',serif;font-size:clamp(15px,1.8vw,22px);color:var(--kin-akarui);letter-spacing:.08em;}
  .quiz-score{font-size:clamp(15px,1.8vw,22px);color:var(--washi);font-weight:700;}
  .quiz-score b{color:var(--kin-akarui);}
  .choices{display:flex;flex-direction:column;gap:12px;}
  .choice{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(18px,2.3vw,28px);text-align:left;
    padding:16px 22px;border-radius:12px;cursor:pointer;
    background:var(--washi);color:var(--sumi);
    border:3px solid var(--kin);
    box-shadow:0 4px 0 rgba(58,92,52,.35);
    transition:transform .08s,background .15s;
  }
  .choice:hover{background:var(--kin-akarui);transform:translateY(-2px);}
  .choice:disabled{cursor:default;opacity:.92;transform:none;}
  .choice.correct{background:#5c8a52;color:#fff;border-color:#7fae66;}
  .choice.wrong{background:#9c4632;color:#fff;border-color:#c46a5e;}
  .choice .mark{font-family:'Yuji Syuku',serif;margin-right:.4em;color:var(--aoi-fuka);}
  .choice.correct .mark,.choice.wrong .mark{color:#fff;}
  .quiz-next{
    margin-top:16px;display:none;width:100%;
    font-family:'Yuji Syuku',serif;font-size:clamp(18px,2.2vw,26px);
    padding:14px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--kin),#a8852f);color:var(--sumi);
    letter-spacing:.12em;box-shadow:0 4px 0 #6a5512;
  }
  .quiz-next:active{transform:translateY(4px);box-shadow:0 1px 0 #6a5512;}
  .quiz-next.show{display:block;}

  /* ===== 年表 ===== */
  .tl-label{font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);margin-bottom:14px;letter-spacing:.1em;font-weight:700;}
  .timeline{
    display:flex;gap:14px;overflow-x:auto;padding:6px 2px 16px;
    scroll-snap-type:x proximity;
  }
  .timeline::-webkit-scrollbar{height:10px;}
  .timeline::-webkit-scrollbar-thumb{background:var(--kin);border-radius:999px;}
  .tl-item{
    flex:0 0 auto;width:clamp(150px,18vw,200px);
    scroll-snap-align:start;cursor:pointer;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);border:2px solid var(--kin);border-radius:12px;
    padding:14px 14px 16px;text-align:center;
    box-shadow:0 6px 16px rgba(0,0,0,.35);
    transition:transform .12s,box-shadow .12s;position:relative;
  }
  .tl-item::after{
    content:"";position:absolute;right:-15px;top:50%;width:14px;height:3px;
    background:var(--kin);
  }
  .tl-item:last-child::after{display:none;}
  .tl-item:hover{transform:translateY(-4px);box-shadow:0 10px 22px rgba(0,0,0,.5);}
  .tl-item.active{outline:4px solid var(--kin-akarui);}
  .tl-year{
    font-family:'Yuji Syuku',serif;font-size:clamp(20px,2.4vw,30px);
    color:var(--aoi-fuka);letter-spacing:.04em;
  }
  .tl-age{font-size:clamp(12px,1.3vw,15px);color:#5a6b3d;margin:2px 0 8px;}
  .tl-title{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(15px,1.7vw,20px);line-height:1.4;}

  /* ===== 地図（本物の日本地図SVG） ===== */
  .map-label{font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);margin-bottom:6px;letter-spacing:.08em;font-weight:700;}
  .map-sub{font-size:clamp(12px,1.4vw,16px);color:var(--sumi-usu);margin-bottom:14px;letter-spacing:.05em;}
  .map-wrap{
    position:relative;width:100%;
    background:radial-gradient(ellipse at 55% 45%, #243018, #11160d);
    border:2px solid var(--kin);border-radius:12px;
    overflow:hidden;
  }
  .map-wrap svg{display:block;width:100%;height:auto;}
  /* 県のぬり（地方別のうすい色／家康ゆかりの国を強調） */
  #japanMapSvg .prefecture polygon,
  #japanMapSvg .prefecture path{
    fill:#cdbb8e;stroke:#7a6a3e;stroke-width:.4;stroke-linejoin:round;
  }
  /* ゆかりの国（三河=愛知, 遠江駿河=静岡, 武蔵=東京, 美濃=岐阜） */
  #japanMapSvg .prefecture[data-code="23"] polygon,
  #japanMapSvg .prefecture[data-code="22"] polygon,
  #japanMapSvg .prefecture[data-code="22"] path,
  #japanMapSvg .prefecture[data-code="13"] polygon,
  #japanMapSvg .prefecture[data-code="21"] polygon{ fill:#8fae6e; }
  /* 京・大坂のあたり（参考） */
  #japanMapSvg .prefecture[data-code="26"] polygon,
  #japanMapSvg .prefecture[data-code="27"] polygon{ fill:#c8a06a; }
  #japanMapSvg .boundary-line{ display:none; }

  /* ルート線・参考地点・ピン（viewBox拡大に合わせ小さめの値） */
  .map-route{fill:none;stroke:var(--kin-akarui);stroke-width:1.2;stroke-dasharray:3 2.5;opacity:.85;stroke-linejoin:round;}
  #japanMapSvg .ref-dot{fill:rgba(244,234,214,.5);}
  #japanMapSvg .ref-name{
    font-family:'Zen Maru Gothic',sans-serif;font-size:5px;font-weight:700;
    fill:rgba(244,234,214,.7);text-anchor:middle;
    paint-order:stroke;stroke:#11160d;stroke-width:1px;stroke-linejoin:round;
  }
  .map-pin{cursor:pointer;}
  .map-pin .pin-dot{fill:var(--kin);stroke:#fff;stroke-width:.7;transition:r .15s,fill .15s;}
  .map-pin:hover .pin-dot{fill:var(--kin-akarui);}
  .map-pin.active .pin-dot{fill:var(--aka);r:8;}
  .map-pin .pin-num{
    font-family:'Yuji Syuku',serif;font-size:6px;fill:var(--sumi);
    text-anchor:middle;dominant-baseline:central;pointer-events:none;font-weight:700;
  }
  .map-pin.active .pin-num{fill:#fff;}
  .map-pin .pin-name{
    font-family:'Zen Maru Gothic',sans-serif;font-size:6.5px;font-weight:700;
    fill:var(--washi);text-anchor:middle;paint-order:stroke;
    stroke:#11160d;stroke-width:1.6px;stroke-linejoin:round;pointer-events:none;
  }
  .map-pin.active .pin-name{fill:var(--kin-akarui);}
  .map-steps{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .map-step{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(13px,1.6vw,18px);
    padding:9px 15px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.08);color:var(--washi);
    border:2px solid var(--kin);transition:all .15s;
    display:flex;align-items:center;gap:7px;
  }
  .map-step .step-no{
    display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;
    background:var(--kin);color:var(--sumi);font-family:'Yuji Syuku',serif;font-size:13px;
  }
  .map-step:hover{background:var(--kin);color:var(--sumi);transform:translateY(-2px);}
  .map-step:hover .step-no{background:var(--sumi);color:var(--kin-akarui);}
  .map-step.active{background:linear-gradient(180deg,var(--aoi),var(--aoi-fuka));border-color:var(--kin-akarui);}

  footer{
    position:relative;z-index:2;text-align:center;
    font-size:13px;color:rgba(244,234,214,.4);
    padding:14px;letter-spacing:.1em;
  }
  @media(max-width:560px){
    .stage{flex-direction:column;align-items:center;}
    .scroll::before{display:none;}
    .ieyasu{order:-1;}
  }

  /* ===== 戦国ききくらべ ===== */
  .s-trio{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .s-trio .tc{flex:1 1 0;min-width:150px;display:flex;align-items:center;gap:10px;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));color:var(--sumi);
    border:2px solid var(--kin);border-top:7px solid var(--c);border-radius:12px;
    padding:10px 12px;box-shadow:0 6px 16px rgba(0,0,0,.3);}
  .s-trio .tf{flex:0 0 auto;width:46px;height:46px;border-radius:50%;display:grid;place-items:center;
    color:#fff;font-family:'Yuji Syuku',serif;font-size:24px;background:var(--c);}
  .s-trio .tn{font-family:'Yuji Syuku',serif;font-size:clamp(15px,1.8vw,20px);color:var(--c);letter-spacing:.04em;}
  .s-trio .tg{font-size:clamp(11px,1.3vw,14px);font-weight:700;line-height:1.4;margin-top:1px;}

  .cmp-chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px;}
  .cmp-chips .chip{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(14px,1.7vw,19px);
    padding:9px 16px;border-radius:999px;cursor:pointer;background:rgba(244,234,214,.08);color:var(--washi);
    border:2px solid var(--kin);transition:all .15s;}
  .cmp-chips .chip:hover{background:var(--kin);color:var(--sumi);transform:translateY(-2px);}
  .cmp-cards{display:flex;flex-direction:column;gap:14px;margin-top:18px;}
  .cmp-card{display:flex;align-items:flex-start;gap:16px;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));color:var(--sumi);border-radius:14px;
    padding:18px 20px;border:2px solid var(--kin);border-left:9px solid var(--cc,#4f7a44);
    box-shadow:0 8px 22px rgba(0,0,0,.35);opacity:0;transform:translateY(10px);animation:cmpIn .4s ease forwards;}
  @keyframes cmpIn{to{opacity:1;transform:translateY(0);}}
  .cmp-face{flex:0 0 auto;width:66px;height:66px;border-radius:50%;overflow:hidden;
    background:#1c2116;border:3px solid var(--cc,#4f7a44);}
  .cmp-face img{width:100%;height:100%;object-fit:cover;display:block;}
  .cmp-face-fb{display:none;width:100%;height:100%;align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;font-size:30px;color:#f4ead6;background:var(--cc,#4f7a44);}
  .cmp-face.no-img img{display:none;}
  .cmp-face.no-img .cmp-face-fb{display:flex;}
  .cmp-body{flex:1;min-width:0;}
  .cmp-name{font-family:'Yuji Syuku',serif;font-size:clamp(17px,2vw,23px);color:var(--cc,#4f7a44);letter-spacing:.05em;margin-bottom:4px;}
  .cmp-text{font-family:'Klee One',serif;font-weight:600;font-size:clamp(16px,2vw,23px);line-height:1.7;}
  .cmp-empty{background:rgba(244,234,214,.92);color:var(--sumi);border:2px solid var(--kin);border-radius:12px;
    padding:18px;font-family:'Klee One',serif;font-weight:600;font-size:clamp(16px,2vw,22px);line-height:1.7;}
</style>
</head>
<body>
  <header>
    <div class="mon">
      <span class="mon-maru">徳</span>
      <div>
        <h1>家康くん</h1>
        <div class="sub">せんごく ものしり もんどう</div>
      </div>
      <span class="mon-maru">川</span>
    </div>
  </header>

  <main>
    <div class="mode-bar">
      <button class="mode-btn active" data-mode="qa">もんどう</button>
      <button class="mode-btn" data-mode="sengoku">戦国ききくらべ</button>
      <button class="mode-btn" data-mode="quiz">家康クイズ</button>
      <button class="mode-btn" data-mode="timeline">年表</button>
      <button class="mode-btn" data-mode="map">地図</button>
    </div>

    <div class="stage">
      <div class="ieyasu">
        <div class="face" id="face">
          <img class="mouth closed"
               src="https://raw.githubusercontent.com/byakusen/dfgeoge.ieyasu_gazou/main/ieyasu.png"
               alt="徳川家康（口を閉じた絵）"
               onerror="this.closest('.face').classList.add('no-img');">
          <img class="mouth open"
               src="https://github.com/byakusen/dfgeoge.ieyasu_gazou/blob/main/ieyasu2.png?raw=true"
               alt="" aria-hidden="true"
               onerror="this.style.display='none';">
          <span class="face-fallback">徳<br>川<br>家<br>康</span>
        </div>
        <div class="name-tag">徳川家康</div>
      </div>
      <div class="scroll">
        <div class="answer" id="answer"></div>
      </div>
    </div>

  {keys:["織田の人質","織田家","熱田","あつた","戸田","裏切り","奪われ"],

  {keys:["結城秀康","ゆうきひでやす","次男","じなん","秀康","ひでやす"],

   a:"1582年、信長が本能寺でたおれたとき、わしはわずかな供(とも)をつれて堺(さかい)を見物しておった。同盟相手の信長が急に討たれ、わし自身も命をねらわれかねぬ。生涯でも指おりの、あやうい瞬間であったよ。一時は、あとを追おうとさえ思うたほどじゃ。"},
  {keys:["伊賀越え","いがごえ","神君伊賀越え","逃げ帰","三河へ逃","命からがら"],
   a:"本能寺の変のあと、わしは「神君伊賀越え(しんくんいがごえ)」とよばれる、命がけの逃避行(とうひこう)をした。伊賀(いが)の険しい山道をこえ、わずかな家臣に守られて、ぶじ三河へもどったのじゃ。わしの生涯でも、最も危険な数日であった。家臣たちの働きに、ただただ感謝よ。"},
  {keys:["本多忠勝","ほんだただかつ","忠勝","ただかつ","蜻蛉切","とんぼぎり"],
   a:"本多忠勝(ほんだただかつ)は、わしの家臣でも一、二をあらそう猛将(もうしょう)じゃ。「蜻蛉切(とんぼぎり)」という長い槍(やり)を手に、生涯で五十回以上も戦に出ながら、かすり傷ひとつ負わなかったと伝わる。本能寺のあと、わしを正気にもどしてくれたのもこの忠勝よ。"},
  {keys:["服部半蔵","はっとりはんぞう","半蔵","忍者","にんじゃ","伊賀の者"],
   a:"服部半蔵(はっとりはんぞう)は、伊賀(いが)の者をたばねた、わしの家臣じゃ。伊賀越えのときは、地元の伊賀・甲賀(こうが)の者たちをまとめ、危険な山道をぶじにこえる手助けをしてくれた。江戸城の門に「半蔵門(はんぞうもん)」という名が今も残っておるぞ。"},
  {keys:["天正壬午","てんしょうじんご","甲斐信濃","五か国","5か国","領地が広","大大名に"],
   a:"信長の死後、主のいなくなった甲斐(かい)・信濃(しなの)をめぐって争いが起き(天正壬午の乱)、わしはこれを制した。これで三河・遠江・駿河・甲斐・信濃の五か国を治める大大名(だいだいみょう)となったのじゃ。混乱のときこそ、落ちついて動いた者が勝つのよ。"},

  // ===== 秀吉との関係 =====
  {keys:["小牧長久手","こまき","ながくて","秀吉と戦","秀吉に勝"],
   a:"1584年、わしは信長の次男・織田信雄(のぶかつ)と組み、豊臣秀吉と小牧・長久手(こまき・ながくて)で戦った。戦そのものではわしが優勢であったが、勝負はつかず和睦(わぼく)に。力でぶつかるより、おりあいをつけることもまた知恵(ちえ)。秀吉のしたたかさも、よう分かった戦いよ。"},
  {keys:["秀吉に従","臣従","しんじゅう","秀吉の家来","頭を下げ","上洛"],
   a:"小牧・長久手のあと、わしは秀吉に臣従(しんじゅう)し、その配下となった。プライドを捨ててでも、無用な戦をさけ、力をたくわえる――それがわしの選んだ道よ。「今は耐えどき」と見れば、頭を下げることもいとわぬ。それが生きのびる知恵なのじゃ。"},
  {keys:["大政所","おおまんどころ","秀吉の母","母を人質","人質を送"],
   a:"秀吉はわしを臣従させるため、自分の妹を妻にくれ、さらに実の母(大政所)まで人質としてわしのもとへ送ってきた。天下人(てんかびと)の秀吉が、そこまでして手を結びたがった――それほどわしの力を、秀吉は重く見ておったということよ。"},
  {keys:["五大老","ごたいろう","大老","たいろう","秀吉の重臣","政治をまかさ"],
   a:"秀吉の晩年(ばんねん)、わしは「五大老(ごたいろう)」という、天下の政(まつりごと)をあずかる五人の重臣の、その筆頭(ひっとう、いちばん上)となった。最も広い領地をもち、最も力のある大名としてな。秀吉なきあとの天下を動かす立場に、わしは静かに近づいていったのよ。"},
  {keys:["関東移封","かんとう","江戸","えど","領地を移","国替え","くにがえ","江戸に入"],
   a:"1590年、秀吉の命でわしは住みなれた東海から、関東(かんとう)へ国替(くにがえ)をさせられた。先祖代々の地をはなれるのはつらい。じゃが、わしはこれを好機(こうき)と見た。江戸(えど)というさびれた土地に入り、ここを天下の中心に育てあげたのじゃ。逆境(ぎゃっきょう)を力に変えたのよ。"},
  {keys:["江戸の町","えどのまち","町づくり","江戸を発展","開発","海をうめ"],
   a:"わしが入ったころの江戸は、湿地(しっち)の多いさびれた土地であった。じゃがわしは、川の流れを変え、海をうめ立て、水路(すいろ)を引いて、人の住みよい大きな町をつくっていった。この江戸が、のちに世界でも指おりの大都市に育つとはな。先を見すえて、土台を築いたのよ。"},
  {keys:["小田原","おだわら","北条","ほうじょう","小田原征伐"],
   a:"1590年、秀吉は関東の大名・北条氏(ほうじょうし)を、大軍でかこんでほろぼした(小田原征伐)。わしもこれに加わってな。この戦いのあと、わしは北条の旧領であった関東へ移されたのじゃ。秀吉による天下統一が、いよいよ仕上げに近づいた戦いであった。"},

  // ===== 関ヶ原 =====
  {keys:["秀吉の死","秀吉が死","ひでよし死","秀吉なきあと"],
   a:"1598年、天下人の秀吉がこの世を去った。あとには、まだ幼い子・秀頼(ひでより)が残された。天下は、ふたたびゆれはじめる。わしは五大老の筆頭として、ここで動くべきか、待つべきか――じっと時を見はかっておったのよ。"},
  {keys:["石田三成","いしだみつなり","三成","みつなり","関ヶ原の敵","西軍の大将"],
   a:"石田三成(いしだみつなり)は、秀吉につくした、まじめで義理がたい家臣じゃ。秀吉の死後、豊臣家を守ろうとして、わしに対する大名たちをまとめ、関ヶ原で西軍を率いて立ち向かってきた。敵ながら、その忠義(ちゅうぎ)は見あげたものであったよ。"},
  {keys:["関ヶ原","せきがはら","天下分け目","東軍","西軍","天下分目"],
   a:"関ヶ原の戦い(1600年)は、「天下分け目(てんかわけめ)」とよばれる大いくさじゃ。わしのひきいる東軍(とうぐん)と、石田三成らの西軍(せいぐん)が、岐阜県の関ヶ原でぶつかった。たった一日で決着がつき、わしが勝った。この勝利で、わしは天下人への道を、たしかなものにしたのよ。"},
  {keys:["関ヶ原勝因","なぜ勝","どうやって勝","裏切","内応","寝返り"],
   a:"関ヶ原でなぜ勝てたか。じつは戦の前から、わしは敵方の大名たちにこっそり手紙を送り、味方に引き入れる工作(こうさく)を重ねておった。戦がはじまると、その者たちが寝返り(ねがえり)、勝負は一気に決した。戦は、はじまる前にもう勝負がついている――辛抱づよい根回しの勝利よ。"},

  // ===== 将軍・江戸幕府 =====
  {keys:["征夷大将軍","せいいたいしょうぐん","将軍になっ","将軍に","しょうぐんに"],
   a:"1603年、わしは朝廷から征夷大将軍(せいいたいしょうぐん)に任じられた。武士のかしらとして、天下を治める正式な位じゃ。これにて江戸に幕府(ばくふ)を開いた。長い辛抱のすえ、わしはついに天下の頂(いただき)に立ったのよ。62さいのことであった。"},
  {keys:["江戸幕府","えどばくふ","幕府を開","幕府ひら","ばくふ"],
   a:"わしが江戸に開いた幕府(ばくふ)は、なんと約260年ものあいだ続いた。戦さの絶えなんだ世が、ここから長い平和の時代「天下泰平(てんかたいへい)」へと変わったのじゃ。人々が安心してくらせる世をつくること――それこそ、わしのいちばんの願いであったのよ。"},
  {keys:["将軍を譲","秀忠に譲","二年で","将軍をやめ","大御所","おおごしょ"],
   a:"わしは将軍になってわずか2年後の1605年、その位を息子の秀忠にゆずった。自分は「大御所(おおごしょ)」として、なお政(まつりごと)を後ろからささえてな。早く譲ったのには、大きなわけがあったのじゃ。さて、なぜだと思う？"},
  {keys:["なぜ譲","どうして譲","譲った理由","世襲","せしゅう","徳川が代々"],
   a:"なぜ将軍をすぐ秀忠に譲ったか。それはな、「将軍の位は、これから先ずっと徳川家が代々(だいだい)受けつぐのだ」と、天下にはっきり示すためよ。豊臣家にも、ほかの大名にも、「天下はもう徳川のものだ」と知らしめたのじゃ。先の先まで見すえた一手であった。"},
  {keys:["駿府","すんぷ","静岡","しずおか","晩年どこ","隠居"],
   a:"将軍を譲ったあと、わしは駿府(すんぷ、いまの静岡市)に移り住んだ。じつは、わしが幼いころ人質として過ごした、思い出の地でな。「大御所」として、ここから江戸の秀忠を見守り、天下の政を動かした。最期(さいご)もこの駿府で、静かにむかえたのじゃ。"},

  // ===== 大坂の陣 =====
  {keys:["大坂冬の陣","おおさかふゆ","冬の陣","ふゆのじん","大坂城をかこ"],
   a:"1614年、わしは豊臣秀頼(ひでより)のいる大坂城を大軍でかこんだ。「大坂冬の陣(ふゆのじん)」じゃ。大坂城はかたく、なかなか落ちぬ。そこでわしは、いったん和睦(わぼく)を結び、城の堀(ほり)をうめさせた。力ずくでなく、知恵で守りをくずす――辛抱づよいわしのやり方よ。"},
  {keys:["方広寺","ほうこうじ","鐘","かね","国家安康","こっかあんこう","言いがかり"],
   a:"大坂の陣のきっかけの一つが「方広寺(ほうこうじ)の鐘(かね)」じゃ。豊臣家がつくった鐘に「国家安康(こっかあんこう)」と刻まれておってな。これは「家康」の名を二つに切って呪(のろ)うものだ、とわしの側が問題にした。難くせ(なんくせ)とも言われるが、これも豊臣をくずすための一手であった。"},
  {keys:["真田","さなだ","幸村","ゆきむら","真田丸","信繁","のぶしげ"],
   a:"大坂の陣で、わしを最も苦しめた敵が真田幸村(さなだゆきむら、信繁)じゃ。「真田丸(さなだまる)」という出城(でじろ)を築いてわしの大軍を打ちやぶり、夏の陣ではわしの本陣めがけて突撃(とつげき)してきた。敵ながら、まことにあっぱれな武将であったよ。"},
  {keys:["大坂夏の陣","おおさかなつ","夏の陣","なつのじん","豊臣滅","とよとみほろ","秀頼","ひでより","淀殿"],
   a:"1615年、「大坂夏の陣(なつのじん)」でわしはついに大坂城を攻め落とした。豊臣秀頼(ひでより)とその母・淀殿(よどどの)は城とともにほろび、これにて豊臣家は絶えた。長く世を乱した戦さの種が、ここでついに消えたのじゃ。こうして天下は、まことに一つになった。"},

  // ===== 政策・治世 =====
  {keys:["幕藩体制","ばくはん","大名を治","大名のしくみ","国を治める仕組み"],
   a:"わしがつくった世の仕組みを「幕藩体制(ばくはんたいせい)」とよぶ。幕府が全国の大名をたばね、それぞれの大名が自分の領地(藩)を治める形じゃ。中心と地方のバランスをうまくとってな。この仕組みのおかげで、世は長く安定したのよ。"},
  {keys:["武家諸法度","ぶけしょはっと","大名のきまり","大名のルール","法度","はっと"],
   a:"わしは大名たちが守るべききまり「武家諸法度(ぶけしょはっと)」を定めた。城を勝手につくってはならぬ、無断で結婚してはならぬ……などのきまりじゃ。大名の力が大きくなりすぎぬようにおさえ、ふたたび戦が起こらぬようにしたのよ。平和を保つための、大切なきまりであった。"},
  {keys:["公家","くげ","朝廷","ちょうてい","天皇","てんのう","禁中並公家諸法度"],
   a:"わしは天皇や公家(くげ)についても、守るべききまり「禁中並公家諸法度(きんちゅうならびにくげしょはっと)」を定めた。朝廷とはあらそわず、敬(うやま)いながらも、その役わりをきちんと決めてな。古いものを大切にしつつ、新しい世の秩序(ちつじょ)を整えたのじゃ。"},
  {keys:["朱印船","しゅいんせん","貿易","ぼうえき","外国と商売","海外"],
   a:"わしは「朱印状(しゅいんじょう)」という、海外との商売を許す証明書を出し、外国との貿易(ぼうえき)をさかんにした(朱印船貿易)。海のむこうから珍しい品が入り、国も豊かになる。平和な世をつくるには、戦さの強さだけでなく、商売の力も大事なのよ。"},
  {keys:["三浦按針","みうらあんじん","ウィリアム","アダムス","外国人","イギリス","西洋人"],
   a:"わしは、海でそうなんしてきたイギリス人ウィリアム・アダムスを家臣にとりたて、「三浦按針(みうらあんじん)」という名をあたえた。世界のことや、進んだ船・大砲(たいほう)づくりを教わってな。生まれや国にこだわらず、役立つ者は登用(とうよう)する。それがわしの考えよ。"},
  {keys:["学問","がくもん","林羅山","はやしらざん","儒学","じゅがく","朱子学","学者"],
   a:"わしは学問をたいへん重んじ、林羅山(はやしらざん)という学者をそば近くに用いた。武力だけでは、世はおさまらぬ。礼儀(れいぎ)や道理(どうり)を学ぶ学問でこそ、人の心はおさまる。戦の世を終わらせ、学びの世をひらく――それがわしの願いであった。"},
  {keys:["天下泰平","てんかたいへい","平和な世","へいわ","戦のない世","260年"],
   a:"わしがつくった江戸の世は、約260年もの長きにわたって、大きな戦のない「天下泰平(てんかたいへい)」が続いた。これは世界の歴史でもめずらしいことよ。戦いに勝つことより、戦いのいらぬ世をつくること――それこそが、わしの本当の目標であったのじゃ。"},

  // ===== 死・神格化 =====
  {keys:["死","しんだ","亡くな","最期","さいご","いつ死","死去","享年","何歳で死","数え75"],
   a:"わしは1615年に天下を一つにまとめあげ、その翌年の1616年、駿府(すんぷ)で静かに世を去った。数(かぞ)えで75さい――戦国の武将としては、たいそうな長生きであった。長く辛抱し、長く生きたからこそ、最後に天下を手にできたのよ。"},
  {keys:["死因","しいん","なぜ死","病気","てんぷら","鯛","たい","食あたり"],
   a:"わしの死因はな、好物の鯛(たい)の天ぷらを食べてあたった、という話が有名じゃ。じゃが本当は、胃のあたりの病(やまい)だったのではないか、と今の学者は考えておる。あれほど健康に気をつけたわしでも、寄る年波(としなみ)には勝てなんだのよ。"},
  {keys:["日光","にっこう","東照宮","とうしょうぐう","お墓","おはか","久能山","くのうざん","まつられ"],
   a:"わしのなきがらは、まず駿河の久能山(くのうざん)にほうむられ、のちに下野(しもつけ、いまの栃木県)の日光(にっこう)へ移された。それが「日光東照宮(にっこうとうしょうぐう)」じゃ。きらびやかな社(やしろ)でな、今も多くの人がおとずれる。世界遺産(せかいいさん)にもなっておるぞ。"},
  {keys:["東照大権現","とうしょうだいごんげん","神になっ","神様","かみさま","ごんげん"],
   a:"わしは死んだのち、「東照大権現(とうしょうだいごんげん)」という神(かみ)としてまつられた。「東(東国)を照らす神」という意味よ。江戸の世を守る守り神となったのじゃ。一人の人間が、辛抱と努力のすえに天下をとり、ついには神とまでなる――おどろきの一生であろう。"},
  {keys:["遺訓","いくん","遺言","ゆいごん","人の一生は重荷","名言","めいげん","ことば"],
   a:"わしの言葉として「人の一生は、重荷(おもに)を負(お)うて遠き道を行くがごとし。いそぐべからず」と伝わる。人生は重い荷物をせおって長い道を歩むようなもの。あせらず、一歩ずつ進めよ――そんな意味じゃ。辛抱づよく生きたわしらしい言葉であろう。"},

  // ===== 性格・人となり =====
  {keys:["性格","せいかく","どんな人","人がら","ひとがら","どういう人"],
   a:"わしか？　とにかく辛抱(しんぼう)づよく、慎重(しんちょう)で、けっしてあせらぬ。チャンスが来るまで、何年でもじっと待つ。倹約(けんやく)家で、健康にも気をつかった。はでさはないが、こつこつと土台を固める――そういう男よ。最後に笑うのは、辛抱づよい者なのじゃ。"},
  {keys:["ほととぎす","ホトトギス","鳴くまで待","鳴かぬなら","信長秀吉とちがい","三人のちがい"],
   a:"後の世の人が、わしら三人の気性を、鳴かないホトトギスにたとえた歌がある。信長は「鳴かぬなら殺してしまえ」、秀吉は「鳴かせてみせよう」、そしてわしは「鳴くまで待とう」――とな。作り話じゃが、辛抱づよく時を待つわしの気性を、みごとに言いあてておるのう。"},
  {keys:["三英傑","さんえいけつ","信長秀吉家康","三人","信長と秀吉と"],
   a:"信長・秀吉・そしてわし家康――この三人は「三英傑(さんえいけつ)」とよばれる。信長が天下統一の道を切りひらき、秀吉がそれをなしとげ、そしてわしが、長く続く平和な世(江戸幕府)をつくった。三人の力で、戦国の世を終わらせたとも言えるのよ。"},
  {keys:["健康","けんこう","薬","くすり","健康オタク","長生きの秘訣","薬を作"],
   a:"わしは、たいそう健康に気をつかう男であった。自分で薬草(やくそう)を調べ、薬を調合(ちょうごう)して飲んだほどでな。「天下をとるには、まず長生きすること」と考えておったのじゃ。げんに、ライバルたちより長く生き、最後に天下を手にした。健康こそ、最大の武器よ。"},
  {keys:["食べ物","たべもの","食事","しょくじ","好物","こうぶつ","麦飯","むぎめし","何を食べ"],
   a:"わしの食事は、いたって質素(しっそ)であった。ぜいたくをきらい、ふだんは白米でなく、体によい麦飯(むぎめし)を好んで食べた。天下人になっても、その質素な習慣を変えなんだ。食べ物に気をつけることも、長生きの大事なひけつなのじゃ。"},
  {keys:["倹約","けんやく","けち","節約","せつやく","お金を大事","ぜいたくしない"],

// 入力にいちばん合う答えをさがす
function findAnswer(text){
  const t = (text||"").replace(/\s/g,"");
  if(!t) return null;
  let best=null, bestScore=0;
  for(const item of KB){
    let score=0;
    for(const k of item.keys){ if(t.includes(k)) score += k.length; }
    if(score>bestScore){bestScore=score; best=item;}
  }
  return bestScore>0 ? best.a : null;
}

// ===== タイプライター表示 =====
const answerEl = document.getElementById('answer');
const faceEl = document.getElementById('face');
let typing=null;

// ===== 口パク（信長くんと同じ仕組み：talking-openのopacityを0.13秒ごとに切り替える。位置は一切動かさない＝揺れない） =====
let mouthTimer=null;
function startMouth(){
  stopMouth();
  mouthTimer=setInterval(()=>{ faceEl.classList.toggle('talking-open'); },130);
}
function stopMouth(){
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer=null; }
  faceEl.classList.remove('talking-open');
}

function speak(text, mood){
  // ふつうのしゃべりは揺らさない。正解(seikai=うなずく)/不正解(zannen=横に振る)のときだけ演出。
  faceEl.classList.remove('seikai','zannen'); void faceEl.offsetWidth;
  if(mood==='seikai' || mood==='zannen') faceEl.classList.add(mood);
  if(typing) clearInterval(typing);
  answerEl.innerHTML="";
  let i=0;
  const cursor=document.createElement('span');
  cursor.className='cursor'; cursor.textContent='　';
  answerEl.appendChild(cursor);
  startMouth();                 // しゃべりはじめ：口パク開始
  typing=setInterval(()=>{
    if(i>=text.length){clearInterval(typing); cursor.remove(); stopMouth(); return;}  // しゃべりおわり：口を閉じる
    const ch=document.createTextNode(text[i]);
    answerEl.insertBefore(ch,cursor);
    i++;
  },32);
}

function handleAsk(text){
  const a = findAnswer(text);
  if(a){ speak(a); }
  else{ speak(NOT_FOUND[Math.floor(Math.random()*NOT_FOUND.length)]); }
}

// ===== 入力イベント =====
const qEl=document.getElementById('q');

// IME（日本語入力）の変換確定中かどうかを記録する
let composing=false;
qEl.addEventListener('compositionstart',()=>{ composing=true; });
qEl.addEventListener('compositionend',()=>{ composing=false; });

document.getElementById('askBtn').onclick=()=>handleAsk(qEl.value);
qEl.addEventListener('keydown',e=>{
  // 漢字変換などの確定リターンでは送信しない。
  // 変換が確定し、ふつうにリターンを押したときだけ質問を送る。
  if(e.key==='Enter' && !composing && !e.isComposing){
    handleAsk(qEl.value);
  }
});

const MARKS=["一","二","三"];

let quizState={order:[],pos:0,right:0,done:0,finished:false};
const choicesEl=document.getElementById('choices');
const quizNextEl=document.getElementById('quizNext');
const quizCountEl=document.getElementById('quizCount');
const quizRightEl=document.getElementById('quizRight');
const quizDoneEl=document.getElementById('quizDone');

function shuffle(n){const a=[...Array(n).keys()];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  quizState={order:shuffle(QUIZ.length),pos:0,right:0,done:0,finished:false};
  updateScore();
  showQuestion();
}
function updateScore(){quizRightEl.textContent=quizState.right;quizDoneEl.textContent=quizState.done;}

function showQuestion(){
  const item=QUIZ[quizState.order[quizState.pos]];
  quizCountEl.textContent="第"+(quizState.pos+1)+"問 ／ 全"+QUIZ.length+"問";
  speak("【もんだい】"+item.q);
  choicesEl.innerHTML="";
  const disp=shuffle(item.c.length); // 選択肢の表示順（中身もシャッフル）
  disp.forEach((origIdx,k)=>{
    const b=document.createElement('button');
    b.className='choice';
    b.innerHTML='<span class="mark">'+MARKS[k]+'</span>'+item.c[origIdx];
    b.dataset.correct=(origIdx===item.ans)?"1":"0";
    b.onclick=()=>chooseAnswer(b,item);
    choicesEl.appendChild(b);
  });
  quizNextEl.classList.remove('show');
}

function chooseAnswer(clicked,item){
  const isRight=clicked.dataset.correct==="1";
  choicesEl.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    if(b.dataset.correct==="1"){b.classList.add('correct');b.querySelector('.mark').textContent='○';}
    else if(b===clicked){b.classList.add('wrong');b.querySelector('.mark').textContent='✕';}
  });
  quizState.done++;
  if(isRight){quizState.right++;speak("あっぱれ！　"+item.e,'seikai');}
  else{speak("むむ、ざんねん。正しくは「"+item.c[item.ans]+"」じゃ。"+item.e,'zannen');}
  updateScore();
  if(quizState.pos>=quizState.order.length-1){
    quizState.finished=true;
    quizNextEl.textContent="けっか発表 ▶";
  }else{
    quizNextEl.textContent="つぎの問題へ ▶";
  }
  quizNextEl.classList.add('show');
}

quizNextEl.onclick=()=>{
  if(quizState.finished){
    const r=quizState.right,n=QUIZ.length;
    let msg;
    if(r===n) msg="天下無双じゃ！　全問正解、みごとであった！";
    else if(r>=n*0.7) msg="あっぱれ、なかなかの戦国通じゃな！";
    else if(r>=n*0.4) msg="うむ、よう学んだ。あせらず、あと一息よ。";
    else msg="これからじゃ。辛抱づよく、もう一度いどんでみよ！";
    speak("【けっか】全"+n+"問のうち、"+r+"問せいかい！　"+msg,'seikai');
    choicesEl.innerHTML="";
    quizNextEl.textContent="もう一度いどむ ▶";
    quizState.finished=false;
    quizState.restart=true;
    return;
  }
  if(quizState.restart){quizState.restart=false;startQuiz();return;}
  quizState.pos++;
  showQuestion();
};

const timelineEl=document.getElementById('timeline');
function renderTimeline(){
  timelineEl.innerHTML="";
  TIMELINE.forEach((ev)=>{
    const d=document.createElement('div');
    d.className='tl-item';
    d.innerHTML='<div class="tl-year">'+ev.y+'</div><div class="tl-age">'+ev.age+'</div><div class="tl-title">'+ev.t+'</div>';
    d.onclick=()=>{
      timelineEl.querySelectorAll('.tl-item').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
      speak("【"+ev.y+"・"+ev.t+"】"+ev.d);
    };
    timelineEl.appendChild(d);
  });
}
renderTimeline();

const mapWrap=document.getElementById('mapWrap');

const MAP_VIEWBOX="350 600 320 200";
let mapBuilt=false;

function buildMap(){
  if(mapBuilt) return;
  mapBuilt=true;
  mapWrap.innerHTML=JAPAN_SVG;
  const svg=document.getElementById('japanMapSvg');
  svg.setAttribute('viewBox',MAP_VIEWBOX);
  svg.removeAttribute('width'); svg.removeAttribute('height');

  // 各県に地方区分を付け、家康時代の色分け（ゆかりの国を強調）
  const prefByCode={};
  PREFECTURES.forEach(p=>{prefByCode[p.code]=p;});
  svg.querySelectorAll('.prefecture').forEach(el=>{
    const code=+el.dataset.code;
    const p=prefByCode[code];
    if(p) el.setAttribute('data-region',p.region);
  });

  // ルート線（番号順に結ぶ）
  const NS="http://www.w3.org/2000/svg";
  const route=document.createElementNS(NS,'polyline');
  route.setAttribute('class','map-route');
  route.setAttribute('points',PLACES.map(p=>p.x+","+p.y).join(" "));
  svg.appendChild(route);

  // 参考地点
  REF_PLACES.forEach(r=>{
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',r.x); c.setAttribute('cy',r.y); c.setAttribute('r',2.6);
    c.setAttribute('class','ref-dot');
    svg.appendChild(c);
    const t=document.createElementNS(NS,'text');
    t.setAttribute('x',r.x); t.setAttribute('y',r.y-4);
    t.setAttribute('class','ref-name'); t.textContent=r.name;
    svg.appendChild(t);
  });

  // ピン
  PLACES.forEach((p,i)=>{
    const dy=(p.no===5)?14:-9; // 2番目と5番目の駿府が重なるのでラベルを上下に分ける
    const g=document.createElementNS(NS,'g');
    g.setAttribute('class','map-pin');
    g.dataset.idx=i;
    g.innerHTML=
      '<circle class="pin-dot" cx="'+p.x+'" cy="'+p.y+'" r="6"></circle>'+
      '<text class="pin-num" x="'+p.x+'" y="'+p.y+'">'+p.no+'</text>'+
      '<text class="pin-name" x="'+p.x+'" y="'+(p.y+dy)+'">'+p.label+'</text>';
    g.addEventListener('click',()=>selectPlace(i));
    svg.appendChild(g);
  });

  // 下の札
  mapSteps.innerHTML="";
  PLACES.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='map-step';
    b.innerHTML='<span class="step-no">'+p.no+'</span>'+p.label;
    b.onclick=()=>selectPlace(i);
    mapSteps.appendChild(b);
  });
}
function selectPlace(idx){
  const p=PLACES[idx];
  mapWrap.querySelectorAll('.map-pin').forEach((g,i)=>g.classList.toggle('active',i===idx));
  Array.from(mapSteps.children).forEach((b,i)=>b.classList.toggle('active',i===idx));
  speak("【"+p.no+"・"+p.label+"】"+p.d);
}

  if(mode===curMode && mode!=='quiz') return;

    n:"身分や家がらなど問わぬ。役に立つ者は、どこの馬の骨でも引き上げる。秀吉を取り立てたのが、その証(あかし)よ。だめな者は、ようしゃなく替える。",
    h:"人は、心でうごくものよ。ほうびをはずみ、名をあげてやり、ときにおだてる。敵さえも味方に変えてみせるわ。人の心をつかむのが、わしの一番の武器じゃ。",
    i:"わしは忠義(ちゅうぎ)あつい家臣を、生涯大切にした。信じあえる家来こそ、強い武器や大きな城にまさる宝よ。長くつき合い、いざという時に報いるのじゃ。" },
  { keys:["お金","おかね","倹約","けんやく","ぜいたく","節約","せつやく","金の使い方","けち"],
    n:"金はためるより、活(い)かして使うものよ。鉄砲を買い、城を築き、新しい商いをおこす。生きた金の使い方こそ、世をうごかすのじゃ。",
    h:"金はパーッと使って、人をよろこばせるのがよい！　黄金(おうごん)の茶室まで作ったわ。みなが「すごい」と驚くことに使えば、人の心も集まるのじゃ。",
    i:"わしは「けち」と言われるほどの倹約家(けんやくか)よ。ふだんはしまつをして力をたくわえ、ここぞという所にだけ、おしみなく使う。それが家を栄えさせるこつじゃ。" },
  { keys:["新しいもの","あたらしい","新しい物","革新","かわった","流行","南蛮以外の新"],
    n:"わしは新しいものに目がない！　鉄砲、南蛮(なんばん)の品、新しい商いの仕組み――古い者がいやがるものほど、わしは取り入れた。世は、変える者のものよ。",
    h:"おもしろいもの、はなやかなものは大すきじゃ！　黄金、ぜいたくな茶会、大きな城。人がアッと驚くものを、わしはいくつも世に出してみせたわ。",
    i:"わしは、新しいものにも目をくばるが、すぐにはとびつかぬ。よく見きわめ、たしかなものだけを残す。あせって飛びついて、しくじってはつまらぬからのう。" },
  { keys:["戦のやり方","いくさのやり方","たたかいかた","合戦","戦い方","戦法"],
    n:"わしの戦は、すばやさと新しい武器よ。桶狭間では少ない兵で大軍を奇襲し、長篠では鉄砲をそろえて武田の騎馬をやぶった。常識をこわすのが、わしのやり方じゃ。",
    h:"わしは、なるべく血を流さずに勝つのが好みでな。城を水でかこむ(水攻め)、敵を金や調略でくずす。力ずくより、知恵で勝つ――それが秀吉流じゃ！",
    i:"わしは無理をせぬ。守りを固め、相手の弱るのを待ち、勝てる時にだけ動く。三方ヶ原の大敗から学んでな。あせらぬ戦いこそ、生きのこるこつよ。" },
  { keys:["失敗","しっぱい","負け","まけ","しくじり","ピンチ","負けたこと"],
    n:"わしも危機(きき)は数しれぬ。じゃが負けても止まらぬ。すぐ次の手を打ち、勢いで押しきる。立ち止まる時が、いちばん危ういのよ。",
    h:"しくじっても、わしは笑ってごまかし、すぐ立て直すわ！　明るく前を向けば、運も人も集まってくる。くよくよするのは、わしのがらじゃないのう。",
    i:"わしは三方ヶ原で、武田信玄に生涯いちばんの大敗をした。じゃがその負けが、慎重で辛抱づよいわしをつくった。負けからこそ、人は学ぶのじゃ。" },
  { keys:["天下統一","てんかとういつ","天下をとる","世を一つ","統一","天下をまとめ","天下取り"],
    n:"わしは「天下布武」をかかげ、天下統一への道を切りひらいた。古い世をこわし、新しい世への土台をきずいた。じゃが、その途中で本能寺に散ったのよ。",
    h:"信長さまが切りひらいた道を、このわしが受けついで、ついに天下統一をなしとげたのじゃ！　はだしの百姓から天下人へ――胸のすく大出世であろう！",
    i:"信長どのが道を開き、秀吉どのがまとめ、最後にわしが、長く続く平和な世を仕上げた。三人の力で、戦国の世は終わったとも言えるのよ。" },
  { keys:["平和","へいわ","戦のない世","争いのない","天下泰平","泰平"],
    n:"わしの願いは、まず古い世をこわすこと。なまぬるい世は、力で正す。平和は、強い者が一気にまとめてこそ生まれるのよ。",
    h:"わしは戦のうまい男じゃが、いくさで国があれるのも見てきた。天下をまとめ、争いをしずめ、にぎやかで楽しい世にしたかったのよ。",
    i:"わしのつくった江戸の世は、二百六十年あまり大きな戦のない「天下泰平(てんかたいへい)」が続いた。戦いに勝つより、戦いのいらぬ世をつくる――それがわしの本当の目標よ。" },
  { keys:["夢","ゆめ","目標","もくひょう","やりたかった","目ざした","めざした","のぞみ"],
    n:"わしの夢は、古いしきたりにしばられぬ、新しい世をつくること。だれもなしえなかった天下布武――それを力でこじ開けることであった。",
    h:"わしの夢は、ひくい身からのし上がり、天下人になること――そしてそれを、やってのけた！　次は海の向こうまで、と思うたが、それは行きすぎであったかのう。",
    i:"わしの夢は、二度と乱れぬ、長く続く平和な世をつくることよ。一代の栄えより、何代も続く仕組みを残す――それがわしの目ざした道じゃ。" },
  { keys:["後悔","こうかい","悔やん","くやん","反省","やり直せ","やりなおせ"],
    n:"後悔か。家臣の心を、もう少し読めばよかったのかもしれぬ。きびしさが、明智光秀の謀反(むほん)をまねいたとも言われるからのう。",
    h:"悔やむなら、晩年(ばんねん)に海の向こうへ兵を出したことよ(朝鮮出兵)。多くの者を苦しめた。それと、わが子のことばかり気にしすぎたかもしれぬのう。",
    i:"わしの生涯いちばんの悔いは、妻と長男・信康(のぶやす)を、同盟のために失わねばならなかったことじゃ。親が子を……あれほどつらいことはなかった。" },
  { keys:["一番強い","一番つよい","いちばんつよ","だれが強い","だれが一番","一番すごい","だれがすごい","すごいのは","一番えらい","一番なのは"],
    n:"いくさのはやさと、世をこわす勢いなら、わしが一番よ。古い世を打ちくだく力――それは、わしにしかなかった。",
    h:"知恵と人たらしなら、わしが一番じゃ！　なにせ、ひくい身から天下人にまでなったのよ。これにまさる強さがあるか、はっはっは！",
    i:"だれが一番かは、君が学んで決めるがよい。ただ一つ言えるのは――最後まで生きのこって天下を手にしたのは、辛抱づよいこのわしであった、ということよ。" },
  { keys:["共通点","きょうつう","似ているところ","同じところ","共通する","にているところ"],
    n:"三人とも、尾張・三河という同じあたりに生まれ、戦国の世を生きた。そして、古い世を新しい世へ変える大きな流れの中にいた――そこは同じよ。",
    h:"三人とも、もとは大きくない家から立ち上がった者じゃ。そして、力を合わせたり、争ったりしながら、戦国の世を終わらせていった仲間でもあるのう。",
    i:"三人とも、天下を目ざし、家臣にめぐまれ、そして身近な者を失う悲しみも知っておる。立場はちがえど、背おうたものは、案外似ておるのよ。" },
  { keys:["学ぶ","まなぶ","教訓","きょうくん","メッセージ","何を学べ","どう生きる","大切なこと","学んでほしい"],
    n:"古いやり方をうたがえ。だれもやらぬことに、まっ先に手をつけよ。世を変えるのは、いつだって常識をこえる者よ。",
    h:"明るく、あきらめず、人をよろこばせよ。身分がひくくても、工夫と元気があれば、道はどこまでも開ける。わしが、その証(あかし)じゃ！",
    i:"あせらず、辛抱づよく時を待て。健康と備えをおこたるな。約束を守り、人の信用を大切にせよ。こつこつ続ける者が、最後に実を結ぶのじゃ。" },
  { keys:["一言で","ひとことで","たとえると","一言でいうと","まとめると","ひとことでいう"],
    n:"わしを一言でいえば「古い世をこわした革命児(かくめいじ)」。新しき世への、まっ先がけの男よ。",
    h:"わしを一言でいえば「世いちばんの出世人(しゅっせにん)」。はだしの百姓から、天下人になった男じゃ！",
    i:"わしを一言でいえば「辛抱(しんぼう)の人」。待って、待って、最後に天下をつかんだ男よ。" },
  { keys:["大きな決断","けつだん","えらんだ道","一番の決断","大事な決断","決めたこと"],
    n:"わしの大きな決断は、桶狭間で、少ない兵で今川の大軍にいどんだこと。負ければ終わり。じゃが、ためらえばもっと終わりよ。だから、かけた。",
    h:"わしの大決断は、信長さまが本能寺でたおれたと聞き、すぐに大軍を引き返したこと(中国大返し)。だれより速く動いた者が、天下に近づくのじゃ。",
    i:"わしの最も重い決断は、関ヶ原で天下分け目の戦いにいどんだこと。長く辛抱してためた力を、たった一日にかけた。あの一日が、天下を決めたのよ。" },
  { keys:["大事にした","たいせつにした","大切なもの","何を重んじ","重んじた","だいじにした"],
    n:"わしが重んじたのは、力と、新しさと、はやさよ。古いものにしばられず、世を前へ前へと押し進めることじゃ。",
    h:"わしが大事にしたのは、人の心と、にぎやかさよ。みなが笑い、もり上がる――そういう場をつくることが、わしのよろこびであった。",
    i:"わしが重んじたのは、忠義と信用、そして長く続く仕組み(秩序)よ。一代かぎりの栄えより、何代も続く土台を大切にしたのじゃ。" },
  { keys:["好きなもの","すきなもの","このみ","趣味","しゅみ","好きなこと"],
    n:"わしは南蛮(なんばん)の品、めずらしいもの、相撲(すもう)、鷹狩り(たかがり)を好んだ。新しいもの、強いものに、心がおどるのよ。",
    h:"わしは、にぎやかな茶会(ちゃかい)や花見(はなみ)が大すきじゃ！　大ぜいでわいわい楽しむのが、なにより。醍醐(だいご)の花見は、それはみごとであったわ。",
    i:"わしの楽しみは鷹狩り(たかがり)よ。野山をかけるよい運動になり、頭もすっきりする。健康のためにも、これはかかさなんだのじゃ。" },
  { keys:["食べ物","たべもの","食事","しょくじ","好物","こうぶつ","何を食べ"],
    n:"わしは、湯づけのような、さっとした食事を好んだと伝わる。食にこだわって、ぐずぐずするひまはない。腹がふくれれば、それでよいのよ。",
    h:"ひくい身の出だからのう、わしはぜいたくな食もよう知っておる。じゃが本当は、みなで食べる宴(うたげ)のにぎわいこそ、いちばんのごちそうじゃ。",
    i:"わしの食事は質素(しっそ)よ。白米より、体によい麦飯(むぎめし)を好んで食べた。食に気をつけることも、長生きの大事なひけつなのじゃ。" },

  // ---- お互いのこと・三人の関係 ----
  { keys:["信長は","信長って","信長のこと","信長という","信長について","のぶながは","のぶながって","信長","のぶなが"],
    n:"わしのことか。古い世をこわし、天下布武をかかげた。せっかちで、はげしく、新しもの好き。途中で散ったが、世を変える道は、たしかに開いたのよ。",
    h:"信長さまは、わしの大恩人(だいおんじん)じゃ。身分のひくいわしを、どんどん引き上げてくださった。あの方がいなければ、いまのわしはおらぬわ。",
    i:"信長どのとは、清洲(きよす)で同盟を結び、二十年あまり守りぬいた仲よ。すばやく決断する人での。気性はちがえど、たがいによく支えあったのじゃ。" },
  { keys:["秀吉は","秀吉って","秀吉のこと","秀吉という","秀吉について","ひでよしは","ひでよしって","秀吉","ひでよし"],
    n:"秀吉か。あの男は、わしがひくい身から引き上げた。よく働き、頭が回り、人にとり入るのがうまい。「サル」などと呼んだが、まことに役立つ男であったよ。",
    h:"わしのことか。はだしの百姓から、ついに天下人にまでなった男じゃ！　知恵と人たらしで、ここまで来た。これぞ、世いちばんの出世物語であろう！",
    i:"秀吉どのとは、小牧・長久手で一度は戦うたが、のちに和議を結び、わしは臣従(しんじゅう)した。明るく、人をひきつける天才での。一代で天下をきずいた、たいした男よ。" },
  { keys:["家康は","家康って","家康のこと","家康という","家康について","いえやすは","いえやすって","家康","いえやす"],
    n:"家康か。あれは三河の、辛抱づよい男よ。清洲で同盟を結んでな。はでさはないが、こつこつと力をためる。あなどれぬ相手であった。",
    h:"家康どのは、まじめで、がまんづよい御仁(ごじん)よ。わしは妹や母まで送って、必死に手を結んだわ。あの辛抱づよさだけは、わしにはまねできぬのう。",
    i:"わしのことか。とにかく辛抱づよく、あせらず時を待つ。地味と言われようと、最後まで生きのこって、天下をこの手にした男じゃ。" },
  { keys:["信長と秀吉","のぶながとひでよし","信長秀吉の","信長と豊臣"],
    n:"秀吉は、わしが取り立てた家臣の一人よ。よく働き、手がらを立てた。身分など問わず引き上げたわしのやり方が、あの男を天下人にする土台となったのよ。",
    h:"信長さまとわしは、主君(しゅくん)と家来じゃ。あの方の下で、わしは死にものぐるいで働き、出世した。本能寺ののちは、あの方の志(こころざし)を受けついだのよ。",
    i:"信長どのと秀吉どのは、主従の仲よ。信長どのが道を切りひらき、秀吉どのが受けついだ。二人の勢いを、わしはわきから、じっと見ておったのじゃ。" },
  { keys:["信長と家康","のぶながといえやす","信長家康の","信長と徳川","清洲同盟","きよすどうめい"],
    n:"家康とは「清洲同盟(きよすどうめい)」を結んだ仲よ。これがすごいのは、わしが本能寺でたおれるまで、二十年あまり破れなかったこと。約束を守る男であったよ。",
    h:"信長さまと家康どのの同盟は、それはかたい結びつきであった。あの二人がしっかり手を組んでおったからこそ、わしも安心して西で働けたのじゃ。",
    i:"信長どのとは清洲で同盟を結び、生涯これを守りぬいた。約束を守りぬくことが信用を生み、わしの力を大きくした。長い同盟は、わしの誇りよ。" },
  { keys:["秀吉と家康","ひでよしといえやす","秀吉家康の","豊臣と徳川","小牧","こまき","長久手","ながくて"],
    n:"わしの死後、秀吉と家康は小牧・長久手で戦うたと聞く。じゃが決着はつかず、手を結んだ。あの二人、たがいに相手の力を、ようわかっておったのよ。",
    h:"家康どのとは小牧・長久手で戦うたが、勝負はつかなんだ。そこでわしは、妹や母まで送って和議を結んだのじゃ。それほど、あの男と手を結びたかったのよ。",
    i:"秀吉どのとは小牧・長久手で戦い、戦では引かなんだ。じゃが、わしは天下の流れを見て臣従(しんじゅう)した。今は耐えどき、と見たのよ。辛抱も、りっぱな戦いじゃ。" },
  { keys:["三人の関係","さんにんの","三英傑","さんえいけつ","三人","三人とも","信長秀吉家康"],
    n:"わし・秀吉・家康――後の世に「三英傑(さんえいけつ)」と呼ばれる三人よ。わしが切りひらき、秀吉がまとめ、家康が仕上げた。三人で、戦国を終わらせたのよ。",
    h:"三英傑とは、わしら三人のことじゃ！　信長さまが道を開き、このわしが天下をまとめ、家康どのが長い平和の世をつくった。みごとな三人衆(さんにんしゅう)であろう！",
    i:"三英傑――信長どの、秀吉どの、そしてわし。三人が次々に天下への道をつなぎ、ついに乱れた世を終わらせた。一人では、なしえなんだことよ。" },
  { keys:["お互いをどう","相手を","どう思","三人はどう","どう見て","おたがい"],
    n:"秀吉は使える家来、家康はあなどれぬ同盟相手よ。わしの死後、この二人が天下を継いでいくとはな。人の世は、まことにおもしろいものよ。",
    h:"信長さまは大恩人、家康どのは手ごわい好敵手(こうてきしゅ)じゃ。わしは、二人のあいだをうまくわたって、天下をつかんだ。人づきあいこそ、わしの腕の見せどころよ。",
    i:"信長どのは頼れる同盟相手、秀吉どのは仕えるべき天下人であった。わしは二人をよく見て、あせらず学び、自分の時が来るのを待ったのじゃ。" },
  { keys:["力を合わせ","協力","仲良く","争わなければ","もし味方","もし三人が","手を組んで"],
    n:"もし三人が最後まで手を組んでおれば、天下統一はもっと早かったかもしれぬ。じゃが、力ある者どうしは、いつかぶつかるさだめでもあるのよ。",
    h:"三人が仲よく力を合わせれば、こわいものなしじゃ！　げんに、わしは二人とうまくつき合うて天下をとった。人と手を組む力こそ、わしの宝よ。",
    i:"三人がうまくつながったからこそ、世は前へ進んだとも言える。わしは二人と、時に手を結び、時に従い、最後にすべてを受けついだ。つながりは、力になるのじゃ。" },

  // ---- 生い立ち・基本 ----
  { keys:["生まれ","うまれ","いつ生","生い立ち","誕生","生年","いつうまれ","生まれた年"],
    n:"わしは1534年、尾張(おわり、いまの愛知県西部)に生まれた。父は織田信秀(のぶひで)。若いころは「うつけ(ばか者)」と呼ばれたが、内に大きな志(こころざし)を秘めておったのよ。",
    h:"わしは1537年ごろ、尾張の中村(なかむら)という村のひくい家に生まれた。武士の子ですらない。そこから天下人になったのじゃから、これぞ大出世であろう！",
    i:"わしは1542年、三河(みかわ、いまの愛知県東部)の岡崎城(おかざきじょう)に生まれた。じゃが幼くして人質(ひとじち)に出され、つらい子ども時代を過ごしたのよ。" },
  { keys:["出身","しゅっしん","どこの人","どこの出","生まれた土地","身分","みぶん","家がら"],
    n:"わしは尾張の大名・織田家の生まれよ。家がらはあるが、わしは家がらにあぐらをかかぬ。実力ある者を上に置く――それがわしの考えじゃ。",
    h:"わしは尾張の、武士でもない、ひくい身分の出よ。じゃがそれを、わしは少しもはじとは思わぬ。何もない所から立ち上がったことこそ、わしの誇りじゃ！",
    i:"わしは三河の大名・松平(まつだいら)家の生まれよ。けっして大きくはなかったが、忠義あつい三河武士(みかわぶし)にめぐまれた。それが、わしの一生の宝であった。" },
  { keys:["名前","なまえ","名のり","本名","改名","名前が変わ"],
    n:"わしは幼名を吉法師(きっぽうし)といい、のちに織田信長と名のった。「天下布武」の印(いん)をかかげた、その名よ。",
    h:"わしは木下藤吉郎(きのしたとうきちろう)から始まり、羽柴秀吉(はしばひでよし)、そして「豊臣(とよとみ)」の姓(せい)をたまわった。名が変わるたび、わしの立場も上がっていったのよ。",
    i:"わしは竹千代(たけちよ)から、元信・元康をへて「家康」と名のり、のちに松平から「徳川(とくがわ)」へと姓を改めた。名を変えるたびに、立場も大きく変わったのじゃ。" },
  { keys:["子どものころ","こどものころ","幼いころ","おさない","幼少","子ども時代","若いころ"],
    n:"若いころのわしは、かわった身なりで町をねり歩き、「尾張のうつけ(ばか者)」と笑われた。じゃが、それはわしの目が、人とちがう所を見ておったからよ。",
    h:"わしは子どものころ貧しくてな、家をとび出して、あちこちで働いた。苦労したぶん、人の気持ちがよう分かるようになった。それが、のちの人たらしの元手(もとで)よ。",
    i:"わしの子ども時代は、人質(ひとじち)として他家(たけ)で過ごす、つらいものであった。じっと辛抱し、人の心をよく見て学んだ。あの日々が、辛抱づよいわしをつくったのじゃ。" },
  { keys:["父","ちち","おとう","おやじ","父親"],
    n:"わしの父は織田信秀(のぶひで)。尾張で勢いをのばした武将よ。父ゆずりの気の強さで、わしは尾張を一つにまとめていったのじゃ。",
    h:"わしの父は、ひくい身分の者であったと伝わる。早くに亡くしてな。だからこそ、わしは自分の腕一つで、のし上がるしかなかったのよ。",
    i:"わしの父は松平広忠(ひろただ)。まわりを今川や織田にはさまれ、苦労の絶えぬ人であった。わしが幼いころ亡くなってな。父の顔は、あまり覚えておらぬのよ。" },
  { keys:["妻","つま","正室","奥さん","お嫁","結婚","家族"],
    n:"わしの正室は、美濃(みの)の斎藤道三(さいとうどうさん)の娘・濃姫(のうひめ、帰蝶)よ。敵対する家との、政略の結婚(けっこん)であった。妹のお市(おいち)は、絶世の美女と伝わる。",
    h:"わしの妻は、ねね(北政所、きたのまんどころ)。貧しいころから連れそうた、よき女房(にょうぼう)よ。のちに淀殿(よどどの)とのあいだに、待ち望んだわが子・秀頼(ひでより)が生まれたのじゃ。",
    i:"わしは多くの妻や子をもち、各地の大名と縁(えん)を結んだ。じゃが正室の築山殿(つきやまどの)と長男・信康(のぶやす)は、同盟のため失わねばならなんだ……戦国の、悲しいさだめよ。" },

  // ---- 戦国の大きなできごと ----
  { keys:["桶狭間","おけはざま","今川義元","いまがわよしもと","少ない兵で大軍"],
    n:"桶狭間の戦い(1560年)こそ、わしの名を天下にとどろかせた一戦よ！　少ない兵で、今川義元の大軍を奇襲し、義元の首をとった。これでわしの天下への道が開けたのじゃ。",
    h:"桶狭間のころ、わしはまだ信長さまの足軽(あしがる)よ。あの少ない兵での大勝利を、すぐそばで見ておった。「この方こそ天下人じゃ」と、心がふるえたものよ。",
    i:"桶狭間のとき、わしは今川方の武将であった。大将の義元が信長どのに討たれ――これがわしの運命を大きく変えた。これを機に、わしは今川から独立したのじゃ。" },
  { keys:["本能寺","ほんのうじ","本能寺の変","信長の死","信長が死","信長最期"],
    n:"1582年、家臣の明智光秀の謀反(むほん)で、わしは本能寺で討たれた。炎の中で「是非に及ばず(しかたあるまい)」と言うたと伝わる。志(こころざし)なかばの、無念であったよ。",
    h:"本能寺で信長さまがたおれたと聞いたとき、わしは中国(ちゅうごく)で戦のさなかであった。すぐに敵と和を結び、大軍を引き返して光秀を討った――これがわしの天下取りの始まりよ！",
    i:"本能寺の変のとき、わしはわずかな供(とも)で堺(さかい)におった。同盟相手の信長どのが急に討たれ、わし自身も命をねらわれかねぬ。命がけで三河へ逃げ帰った(伊賀越え)、生涯でも危うい数日であった。" },
  { keys:["明智光秀","あけちみつひで","光秀","みつひで","謀反","むほん","裏切った家臣"],
    n:"明智光秀は、わしの有能な家臣であった。その光秀が、なぜわしにそむいたのか――今も、はっきりとは分からぬ。家臣の心を読みきれなんだ、わしの油断であったか。",
    h:"光秀は、信長さまを討った謀反人(むほんにん)じゃ。わしは中国大返しで引き返し、山崎(やまざき)の戦いでこれを討った。主君のかたきを討つ――それがわしの大義(たいぎ)であった。",
    i:"明智光秀の謀反は、世を大きくゆるがした。同盟相手の信長どのを失い、わし自身もあやうく命を落とすところであった。一人の裏切りが、天下の流れを変えたのよ。" },
  { keys:["中国大返し","ちゅうごくおおがえし","大返し","引き返し","急いで戻","びっくりするはやさ"],
    n:"中国大返しは、わしの死を知った秀吉が、おどろくほどの速さで大軍を引き返した、あの行軍よ。あの男のはやさが、天下をたぐりよせたのよ。あっぱれな働きじゃ。",
    h:"これぞ、わしの一生いちばんの見せ場よ！　信長さまの死を知るや、すぐ敵と和を結び、何日もかけて大軍を引き返した。だれより速く動いた者が、天下をつかむのじゃ！",
    i:"秀吉どのの中国大返しは、まことにおどろくべき速さであった。はやさで人の先を行く――それが秀吉どのの強みよ。わしのように、ゆっくり待つ者とは、正反対じゃのう。" },
  { keys:["山崎の戦い","やまざき","天王山","てんのうざん","光秀を討","光秀を倒"],
    n:"山崎の戦いは、わしの死の直後、秀吉が光秀を討った戦いよ。わしのかたきを、あの男が討ってくれた。家臣の中から、天下人が出る――おもしろい世になったものよ。",
    h:"山崎の戦いで、わしは光秀を討ち、信長さまのかたきをとった！　「天王山(てんのうざん)」――勝負どころをこう呼ぶのは、この戦いがもとよ。ここが、わしの大出世の出発点じゃ！",
    i:"山崎の戦いで秀吉どのが光秀を討ち、天下取りに名乗りを上げた。あのすばやさには、わしも舌を巻いた。わしは、その勢いを、じっと見ておったのよ。" },
  { keys:["清洲会議","きよすかいぎ","信長の後継","あとつぎを決め","会議"],
    n:"わしの死後、家臣たちが清洲に集まり、跡(あと)つぎや領地を話し合うた(清洲会議)。そこで頭角(とうかく)をあらわしたのが、秀吉よ。家臣の話し合いで天下が動く――新しい世よのう。",
    h:"清洲会議では、わしは信長さまの幼い孫をおして、うまく主導権(しゅどうけん)をにぎったのじゃ。話し合いの場でも、ぬかりなく立ち回る――それがわしの腕よ！",
    i:"清洲会議は、信長どのなきあとの主導権を決める、大事な場であった。ここで秀吉どのが一歩ぬけ出した。わしはまだ動かず、世の流れをよく見ておったのじゃ。" },
  { keys:["賤ヶ岳","しずがたけ","柴田勝家","しばたかついえ","勝家を破"],
    n:"賤ヶ岳(しずがたけ)の戦いは、わしの死後、秀吉と、わしの古参の家臣・柴田勝家(かついえ)が、天下をかけて争うた戦いよ。勝ったのは秀吉。新しい力が、古い力をこえたのじゃ。",
    h:"賤ヶ岳の戦いで、わしは柴田勝家をやぶり、信長さまの跡をつぐ立場を、たしかなものにした！　ここで活やくした若武者たちは「賤ヶ岳の七本槍(しちほんやり)」と呼ばれたわ。",
    i:"賤ヶ岳で秀吉どのが勝家を破り、天下人への道を固めた。古参(こさん)の重臣をこえて、秀吉どのが上に立った――時代が動くのを、わしは静かに見ておったのよ。" },
  { keys:["小田原","おだわら","北条","ほうじょう","小田原征伐","小田原攻め","関東を平定"],
    n:"小田原の北条(ほうじょう)は、関東に根を張った大きな大名よ。わしの世には、まだ手をつけられなんだ。それを攻めほろぼしたのは、のちの秀吉じゃ。",
    h:"わしは1590年、大軍で小田原の北条をかこみ、ついに攻め落とした。これで天下統一の総仕上げじゃ！　城のそばに一夜で城を見せる「一夜城」も、見せてやったわ。",
    i:"小田原征伐のあと、わしは秀吉どのの命で、住みなれた東海から関東(かんとう)へ国替(くにが)えとなった。さびれた江戸に入ったが、これをのちに天下の中心へと育てたのじゃ。" },
  { keys:["関ヶ原","せきがはら","関ヶ原の戦い","天下分け目","石田三成","いしだみつなり","東軍西軍"],
    n:"関ヶ原は、わしの死から十八年ものちの戦いよ。家康が、天下分け目の大いくさを制したと聞く。わしのまいた種が、めぐりめぐって実ったか――おもしろいものよ。",
    h:"関ヶ原は、わしが世を去ったあとの戦いじゃ。わが豊臣の世を守ろうとした石田三成(いしだみつなり)が、家康どのにいどんだ。じゃが敗れ……わが家は、かたむいていったのよ。無念じゃ。",
    i:"関ヶ原の戦い(1600年)は、わしの東軍が石田三成らの西軍に勝った、天下分け目の決戦じゃ。たった一日で決着がついての。この勝利で、わしは天下人への道をたしかにしたのよ。" },
  { keys:["大坂の陣","おおさかのじん","大坂城を","豊臣を滅","豊臣滅亡","真田","さなだ"],
    n:"大坂の陣は、ずっと後の世のこと。家康が、秀吉の遺(のこ)した豊臣家をほろぼした戦いよ。栄えた家も、いつかは絶える――それが世のならいか。",
    h:"大坂の陣で、わが豊臣家はほろびた……。わが子・秀頼(ひでより)も、母の淀殿(よどどの)も、大坂城とともに散った。一代できずいた天下も、子に残すのは、かくも難しいものよ。",
    i:"大坂の陣(1615年)で、わしは豊臣氏をほろぼし、長く世を乱した戦さの種をついに断った。つらい決断であったが、こうして天下は、まことに一つになったのじゃ。" },
  { keys:["長篠","ながしの","長篠の戦い","鉄砲三段","武田勝頼","かつより","てっぽうで武田"],
    n:"長篠の戦い(1575年)では、わしは家康とともに、たくさんの鉄砲をそろえ、強い武田の騎馬隊(きばたい)をやぶった。新しい武器と工夫の前には、いかに強い軍もかなわぬのよ。",
    h:"長篠は、信長さまと家康どのが、鉄砲で武田をやぶった戦いじゃ。わしも信長さまの下で見ておった。新しいやり方が、古い強さをこえる――学ぶことの多い一戦であったわ。",
    i:"長篠の戦いでは、わしは信長どのとともに、武田勝頼(かつより)の軍と戦うた。さくをならべ、鉄砲を多くそろえて、あの強い武田の騎馬隊を破った。時代が変わった一戦よ。" },

  // ---- 信長の代名詞 ----
  { keys:["楽市楽座","らくいちらくざ","商売を自由","市を開","関所をなくし","経済の改革"],
    n:"わしは「楽市楽座(らくいちらくざ)」をおこなった。だれでも自由に商いができるようにし、関所(せきしょ)もなくして、人と物の流れをよくしたのよ。商いが栄えれば、国も富む。",
    h:"信長さまの楽市楽座は、まことに新しい考えであった。わしもそれを学び、町をにぎやかにし、商いをさかんにした。にぎわう町は、見ていて気持ちがよいものじゃ。",
    i:"信長どのの楽市楽座のような商いをさかんにする工夫は、世を富ませた。わしも江戸で町を大きく育てた。商いと町づくりは、国の土台。先を見すえてまく種よ。" },
  { keys:["鉄砲","てっぽう","火縄銃","南蛮","なんばん","キリスト教","宣教師","西洋","外国"],
    n:"わしは鉄砲や南蛮(なんばん、ヨーロッパ)の品を、まっ先に取り入れた。キリスト教の宣教師(せんきょうし)も受け入れてな。新しいものをこわがらぬ――それがわしの強さよ。",
    h:"わしも南蛮の品や、はなやかなものは大すきじゃ。じゃが、晩年(ばんねん)にはキリスト教の宣教師に「出ていけ」と命じたこともある(バテレン追放)。世のうつりかわりは、難しいものよのう。",
    i:"わしは、海でそうなんしたイギリス人を家臣にとり立て、「三浦按針(みうらあんじん)」と名づけ、世界のことを学んだ。役立つ者は、生まれや国を問わず用いる――それがわしの考えよ。" },
  { keys:["比叡山","ひえいざん","焼き討ち","やきうち","寺を焼","お寺を攻","延暦寺"],
    n:"わしは、刃向(はむ)かう比叡山延暦寺(ひえいざんえんりゃくじ)を焼き討ちにした。むごいと言われるが、力で世にさからう者には、たとえ寺でも容赦(ようしゃ)はせぬ。それがわしのやり方じゃ。",
    h:"信長さまの比叡山焼き討ちは、それはおそろしい出来事であった。じゃが、それほどの覚悟(かくご)がなければ、古い世はこわせなんだのであろうな。",
    i:"信長どのは、刃向かう寺をも焼いた。わしは、そこまではせぬ。むしろ寺社をうまく治め、学問をすすめて、人の心をおさめる道を選んだ。やり方が、ちがうのよ。" },
  { keys:["安土城","あづちじょう","安土","天主","ごうかな城","信長の城"],
    n:"わしは琵琶湖(びわこ)のほとりに、安土城(あづちじょう)を築いた。きらびやかな天主(てんしゅ)がそびえる、それまでにない城よ。城は、わしの力と新しい世を、目に見える形で示すものじゃ。",
    h:"信長さまの安土城は、それはみごとであった。わしも負けじと、大坂城(おおさかじょう)に黄金(おうごん)をちりばめた。城は、天下人の力を世に見せつけるもの。はでにいくのが、よいのじゃ！",
    i:"信長どのの安土城、秀吉どのの大坂城――どちらもはなやかであった。わしの江戸城は、はでさより、守りと町づくりを重んじた。落ちついて長く続く――それがわしの好みよ。" },
  { keys:["天下布武","てんかふぶ","印鑑","信長の旗印","スローガン","目標の言葉"],
    n:"「天下布武(てんかふぶ)」――武(ぶ)をもって天下をおさめる、という志(こころざし)よ。わしはこの言葉を印(いん)にきざみ、新しい世への決意を、天下に示したのじゃ。",
    h:"信長さまの「天下布武」は、まことに大きな志であった。その志を、わしが受けついで、天下統一をなしとげた。旗印(はたじるし)は、人を動かす力をもつものよ。",
    i:"信長どのの「天下布武」は、武で世をおさめる志よ。わしの目ざしたのは、その先――武をおさめ、戦のいらぬ「天下泰平」じゃ。武で開き、文で守る、ということよ。" },
  { keys:["是非に及ばず","ぜひにおよばず","信長の言葉","信長の名言","信長の最期の言葉"],
    n:"「是非に及ばず(ぜひにおよばず)」――光秀の謀反を知ったとき、わしはこう言うたと伝わる。「もうしかたあるまい、じたばたせぬ」という意味よ。最期まで、わしはわしであった。",
    h:"信長さまの「是非に及ばず」は、いさぎよい最期の言葉じゃ。あの方らしい、潔(いさぎよ)さよのう。わしなら、もうひとあがき、生きのびる手をさがしたであろうがな、はっはっは。",
    i:"信長どのの「是非に及ばず」は、覚悟(かくご)の言葉よ。じゃがわしは、最後まであきらめぬ。生きのびて、時を待つ。あきらめねば、道はかならず開ける――それがわしの考えじゃ。" },
  { keys:["足利義昭","あしかがよしあき","室町幕府","むろまちばくふ","将軍を追放","幕府を滅"],
    n:"わしは将軍・足利義昭(あしかがよしあき)を立て、のちに京から追い出して、室町幕府(むろまちばくふ)を終わらせた。古い世の仕組みは、もう用なし。新しい世を、わしが開くのよ。",
    h:"信長さまが室町幕府を終わらせ、古い世を一度こわした。そのまっさらな土台の上に、わしは天下人として立った。こわす者あって、つくる者あり――というわけよ。",
    i:"信長どのが古い幕府をこわしたのち、秀吉どのがまとめ、わしが新しい幕府(江戸幕府)を開いた。同じ「幕府」でも、二度と乱れぬ仕組みに作り変えたのじゃ。" },

  // ---- 秀吉の代名詞 ----
  { keys:["太閤検地","たいこうけんち","検地","けんち","田畑を調べ","土地を測"],
    n:"検地(けんち、田畑を調べること)は、わしの世にも始めておった。それを国じゅうでやりとげたのが、秀吉の太閤検地(たいこうけんち)よ。土地と米の量がわかれば、国はしっかり治まる。",
    h:"わしは国じゅうの田畑を調べる「太閤検地」をおこなった。だれの土地でどれだけ米がとれるか、はっきりさせたのじゃ。これで年貢(ねんぐ)も公平になり、国の力もよう分かるようになったわ。",
    i:"秀吉どのの太閤検地は、国を治める大切な土台となった。わしもこれを引きつぎ、江戸の世の仕組みに役立てた。よい工夫は、敵味方を問わず受けつぐものよ。" },
  { keys:["刀狩","かたながり","刀を取り上げ","武器を集め","農民から武器","身分を分け"],
    n:"百姓から武器を取り上げる刀狩(かたながり)――これは秀吉の世の仕組みよ。武士と百姓をはっきり分ける。乱世を終わらせ、世をおちつかせる、なるほどうまいやり方じゃ。",
    h:"わしは「刀狩」をおこない、百姓から刀や鉄砲を集めた。武器がなければ、一揆(いっき)も起きにくい。武士と百姓をきっぱり分けて、世をおちつかせたのじゃ。ひくい身の出のわしだからこそ、思いついた工夫よ。",
    i:"秀吉どのの刀狩は、世から争いの種をへらす、賢(かしこ)い仕組みであった。わしの江戸の世の身分の仕組みも、これを受けついだもの。おかげで長い泰平が続いたのじゃ。" },
  { keys:["大坂城","おおさかじょう","大坂","秀吉の城","黄金の城","でかい城"],
    n:"大坂城は、秀吉が築いた、それはおおきな城よ。わしの安土城に負けぬ、いや、それをこえる構えであった。家臣が、わしの城をこえる――新しい世が来た、ということじゃのう。",
    h:"わしは天下人のあかしとして、大坂(おおさか)に巨大(きょだい)な城を築いた！　黄金(おうごん)をふんだんに使うてな。だれもが見上げる城――それが、天下人・秀吉のしるしよ！",
    i:"秀吉どのの大坂城は、天下一の名城であった。じゃがその大坂城も、のちにわしとの大坂の陣で落ちた。どれほど立派な城も、永遠(えいえん)ではない。それも、世のならいよ。" },
  { keys:["関白","かんぱく","太閤","たいこう","豊臣の姓","出世の頂点","一番えらい位"],
    n:"秀吉は、武士でありながら、朝廷の高い位「関白(かんぱく)」にまでのぼった。ひくい身からそこまで行くとは、たいしたものよ。出世の天才とは、あの男のことじゃ。",
    h:"わしは武士で初めて「関白」、のちに「太閤(たいこう)」と呼ばれ、「豊臣(とよとみ)」の姓(せい)までたまわった！　はだしの百姓が、朝廷の頂点に立つ――こんな大出世、ほかにあるか！",
    i:"秀吉どのは関白・太閤となり、朝廷の中で頂点に立った。わしは、その道は選ばず、武士のかしら「征夷大将軍(せいいたいしょうぐん)」となった。立つ場所が、ちがうのよ。" },
  { keys:["千利休","せんのりきゅう","利休","りきゅう","茶の湯","ちゃのゆ","茶道","わび","切腹させた茶人"],
    n:"千利休(せんのりきゅう)は、わしも秀吉も用いた、名高い茶(ちゃ)の名人よ。わしは茶の湯を、家臣をねぎらう大切な場として使うた。茶わん一つに、城ほどの値うちを持たせたものよ。",
    h:"わしは千利休を茶頭(さどう)として重んじたが、のちに仲たがいし、切腹(せっぷく)を命じてしもうた……。わしの華やかな黄金の好みと、利休のしずかな「わび」の心は、合わなんだのかもしれぬのう。",
    i:"千利休のしずかな茶の心は、すばらしいものよ。わしも茶の湯をたしなんだが、はでさは好まぬ。質素(しっそ)を旨(むね)とするわしには、利休の「わび」の心は、ようわかるのじゃ。" },
  { keys:["黄金","おうごん","金の茶室","金ぴか","派手","はで","ごうか","ぜいたく好き"],
    n:"はでにかまえることは、力を見せつけるのに役立つ。わしも安土城をきらびやかにした。じゃが、秀吉の黄金の茶室には、わしも少々おどろいたわ。あれは、やりすぎかもしれぬぞ。",
    h:"わしは黄金(おうごん)が大すきでな、持ち運べる「金の茶室」まで作ったわ！　はでに、ど派手(はで)に。みなが目を丸くするのが、たまらぬのよ。これぞ、天下人のはなやかさじゃ！",
    i:"秀吉どのの黄金ずきは、天下人の心意気(こころいき)よ。じゃがわしは、まるで逆。質素・倹約を旨とし、むだをきらった。はでさよりも、長続きを取る――それがわしじゃ。" },
  { keys:["朝鮮出兵","ちょうせんしゅっぺい","唐入り","からいり","文禄","慶長","海の向こうへ","外国に攻め"],
    n:"海の向こうへ兵を出すとは、秀吉も大きく出たものよ。わしも世界に目をむけたが、まずは国内をしっかり固めるのが先。あの出兵は、行きすぎであったかもしれぬのう。",
    h:"わしは晩年(ばんねん)、海の向こう(朝鮮・明)へ兵を出した……。じゃが、これは多くの者を苦しめ、うまくいかなんだ。わしの、いちばんの行きすぎであったと、今は思うておるのよ。",
    i:"秀吉どのの朝鮮出兵には、わしは兵を出さず、力をたくわえておった。海の向こうで多くの大名が弱るのを、わしはじっと見ておった。動かぬことも、時には大事な戦いよ。" },
  { keys:["一夜城","いちやじょう","墨俣","すのまた","出世物語","成り上がり","のし上がっ","成功の秘密"],
    n:"秀吉は、一夜で城を築いて見せたという「一夜城(いちやじょう)」の話で名高い。あの工夫とはやさよ。身分のひくい者が、知恵一つでのし上がる――まことに新しい世よのう。",
    h:"わしの出世のひけつか？　それはな、人より速く、人より工夫し、人をよろこばせること！　一夜で城を見せ、人の心をつかむ。何もない所から、知恵一つでのし上がったのよ、はっはっは！",
    i:"秀吉どのの出世は、まさに知恵とはやさの勝利よ。わしはそれとは逆で、辛抱と時間をかけてのし上がった。はやさの秀吉、辛抱の家康――道はちがえど、行きつく先は同じであったのう。" },
  { keys:["秀頼って","秀頼とは","秀頼","ひでより","淀殿","よどどの","茶々","ちゃちゃ","秀吉の子","あとつぎ秀吉","跡継ぎ問題"],
    n:"秀吉は晩年に、待ちに待ったわが子・秀頼(ひでより)をさずかった。じゃが、幼い子に天下を継がせるのは、まことに難しい。秀吉ほどの男でも、そこは思いどおりにいかなんだのよ。",
    h:"年をとってから生まれたわが子・秀頼は、目に入れてもいたくないほど、かわいかった……。じゃが、わしの死後、幼い秀頼に天下を守りきることは、できなんだ。それだけが、心残りよ。",
    i:"秀吉どのは、幼い秀頼どのの行く末を案じながら世を去った。わしも幼子に天下をたくす危うさを、よう知っておった。だからこそ、わしは早くに将軍を秀忠にゆずり、徳川の世を固めたのじゃ。" },

  // ---- 家康の代名詞 ----
  { keys:["江戸","えど","江戸幕府","えどばくふ","東京","江戸の町","幕府を開"],
    n:"江戸とは、もとはさびれた土地と聞く。それを天下の中心に育てたとは、家康もたいしたものよ。何もない所に町をきずく――その辛抱づよさは、わしにはまねできぬのう。",
    h:"わしは家康どのを、住みなれた東海から、わざと遠い江戸へ移したのじゃ。じゃがあの男は、さびれた江戸を、みごとに大きな町に育てあげた。あなどれぬ御仁(ごじん)よ。",
    i:"わしは1590年に江戸へ移った。はじめはさびれた湿地(しっち)であったが、川を変え、海をうめ立て、大きな町に育てた。ここに幕府を開き、約二百六十年の平和の土台をきずいたのじゃ。" },
  { keys:["征夷大将軍","せいいたいしょうぐん","将軍","しょうぐん","武士のかしら","1603"],
    n:"征夷大将軍(せいいたいしょうぐん)とは、武士をひきいるかしらの位よ。わしも秀吉も、その道は通らなんだ。家康がこの位について幕府を開いたのは、なるほど長続きする選び方じゃ。",
    h:"わしは関白・太閤の道を選んだが、家康どのは将軍の道を選んだ。じゃが将軍は、徳川が代々受けつげる位よ。一代かぎりにならぬよう仕組んだ、家康どのの、したたかさよのう。",
    i:"わしは1603年、征夷大将軍に任じられ、江戸に幕府を開いた。長い辛抱のすえ、ついに天下の頂(いただき)に立ったのじゃ。この位は、徳川が代々受けつぎ、世は長く泰平となったのよ。" },
  { keys:["辛抱","しんぼう","我慢","がまん","待つ","耐え","たえ","待つこと"],
    n:"待つだけでは、世は変わらぬ。わしは、待つより先に動いた。じゃが家康は、待ちに待って、最後にすべてを手にした。なるほど、それも一つの強さじゃ。気の長い男よ。",
    h:"わしはせっかちでな、待つのはどうも苦手じゃ！　その点、家康どのの辛抱づよさだけは、心からおそれ入る。あの「待つ力」が、あの男を最後の勝者にしたのよのう。",
    i:"わしの一生は、辛抱(しんぼう)の連続よ。人質の日々、強い敵、家族を失う悲しみ……。じゃが、あせらず時を待った。「待つ」ことも、りっぱな戦いの一つじゃ。あきらめねば、道は開ける。" },
  { keys:["健康","けんこう","長生き","ながいき","薬","くすり","長寿","何歳まで","健康オタク"],
    n:"わしは数えで四十九で本能寺に散った。もう少し長く生きておれば、と思わぬでもない。健康に気をつかった家康が、最後まで生きのこったのは、あなどれぬ事実よ。",
    h:"わしは数えで六十二まで生きた。家康どのは七十五じゃ。あの男は、自分で薬まで調合(ちょうごう)するほどの健康ずき。長生きそのものが、あの男のいちばんの武器であったのう。",
    i:"わしは数えで七十五まで生きた。三英傑でいちばんの長生きじゃ。自分で薬草を調べ、薬を作って飲んだほどよ。「天下をとるには、まず長生き」――健康こそ、最大の武器なのじゃ。" },
  { keys:["御三家","ごさんけ","尾張紀伊水戸","徳川の分家","跡継ぎの備え","あとつぎの仕組み"],
    n:"将軍家にあとつぎがなくなったとき、別の家から将軍を出す――その「御三家(ごさんけ)」の備えとは、なるほど用心ぶかい。家康らしい、先の先まで見すえた仕組みよ。",
    h:"わしは、幼い秀頼ひとりに天下をたくして、家をほろぼしてしもうた。家康どのは、御三家という「予備(よび)」まで用意した。そこが、わしと家康どのの、いちばんのちがいであったのう……。",
    i:"わしは尾張・紀伊・水戸に「御三家」をおいた。将軍家にあとつぎがなくなれば、ここから次の将軍を出す。徳川の世が長く続くための、大切なそなえよ。先を見越すのが、わしのやり方じゃ。" },
  { keys:["三方ヶ原","みかたがはら","しかみ像","しかみ","信玄に負け","武田に大敗","負けの絵"],
    n:"家康は、武田信玄(しんげん)に三方ヶ原で大敗し、なさけない自分の顔を絵に描かせて戒(いまし)めにした、と聞く(しかみ像)。負けをばねにする男よ。あなどれぬ。",
    h:"三方ヶ原で家康どのは、信玄にこてんぱんにやられたそうじゃ。じゃが、その負けの絵を手元に置いて自分をいましめたとはな。負けても折れぬ――あの辛抱づよさよのう。",
    i:"三方ヶ原の戦いは、わしの生涯いちばんの大敗じゃ。武田信玄の強さの前に、命からがら逃げ帰った。なさけない自分の顔を絵に描かせ(しかみ像)、二度と油断せぬよう、自分への戒めにしたのよ。" },
  { keys:["人質","ひとじち","人質時代","あずけられ","つらい子ども","今川の人質"],
    n:"家康は幼いころ、織田や今川の人質として過ごしたと聞く。つらい日々であったろう。じゃが、その辛抱が、あの男をつくった。苦労は、人を強くするものよのう。",
    h:"わしは貧しさには苦労したが、人質にはならなんだ。家康どのは、幼くして人質よ。じっと辛抱して人の心を学んだという。あの忍耐(にんたい)、わしにはとてもまねできぬのう。",
    i:"わしは六さいから、織田、つぎに今川の人質(ひとじち)として過ごした。自分の国に帰れぬ身は、心細いものであった。じゃが、じっと辛抱し、人の心を学んだ。あの日々こそ、わしの土台よ。" },

  // ---- もっと深いテーマ・対比 ----
  { keys:["城","しろ","城づくり","城をつくる","城のつくりかた","名城"],
    n:"城は、力を世に見せるもの。わしの安土城は、きらびやかな天主で、新しい世を示した。城は、ただ守るだけのものではないのよ。",
    h:"城は、はでに、大きく、おどろくほどに！　わしの大坂城は黄金づくり。一夜城まで作って敵をびっくりさせたわ。城も、人をよろこばせ、おどろかせてこそじゃ！",
    i:"わしは城も、はでさより守りと町づくりを重んじた。江戸城を中心に、人の住みよい大きな町をきずいた。長く続く土台をつくる――それがわしの城づくりよ。" },
  { keys:["家臣への態度","ほうび","ごほうび","ほめる","しかる","賞罰","しょうばつ","部下への","あめとむち"],
    n:"手がらある者には、ようほうびをやる。じゃが、しくじりや裏切りには、容赦(ようしゃ)せぬ。きびしいほうびと罰(ばつ)で、家臣をひきしめる――それがわしのやり方よ。",
    h:"わしは、ほうびをはずみ、ほめちぎって、家臣をやる気にさせるのがうまい！　しかるより、おだてて働かせる。人は、よろこばせれば、いくらでも力を出すものよ、はっはっは！",
    i:"わしは、ふだんは家臣を信じ、いざという所で、おしみなく報いた。きびしさより、長くつき合う信頼(しんらい)を重んじた。忠義は、信じあう所からしか生まれぬのじゃ。" },
  { keys:["裏切り","うらぎり","謀反","むほん","裏切られ","信用できない","だまされ"],
    n:"わしは光秀に裏切られて散った。家臣の心を、読みきれなんだ。きびしさが、ときに人を追いつめる――それが、わしの油断であったのかもしれぬ。",
    h:"わしは裏切られても、笑ってゆるし、味方に変えてしまうことが多かったわ。人は、追いつめるより、ふところに入れたほうがよい。それが、わしの人たらしの極意(ごくい)じゃ。",
    i:"わしも、家臣が一揆(いっき)方について刃向(はむ)かう苦しみを味わった(三河一向一揆)。じゃがこれをゆるし、再び召しかかえた者もいる。人を信じ、長くつき合う――それが結局、強い家をつくるのよ。" },
  { keys:["朝廷","ちょうてい","天皇","てんのう","公家","くげ","朝廷とのつきあい","帝"],
    n:"わしは朝廷を立てつつ、自分の力で天下を動かそうとした。古い権威(けんい)も、使えるうちは使う。じゃが、しばられはせぬ。あくまで、わしが主(あるじ)よ。",
    h:"わしは朝廷をうまく利用してな、武士でありながら関白(かんぱく)の位までのぼった。古い権威も、味方につければ、おそろしく役に立つ。これも、わしの世わたりの腕よ。",
    i:"わしは朝廷から征夷大将軍に任じられ、武士のかしらとして天下を治めた。朝廷を敬(うやま)いつつ、政(まつりごと)は武士がにぎる。たがいの立場を守るのが、長続きのこつよ。" },
  { keys:["宗教","しゅうきょう","仏教","ぶっきょう","お寺","一向一揆","いっこういっき","信仰","神仏"],
    n:"わしは、刃向かう寺や一向一揆(いっこういっき)を、力でおさえつけた。たとえ仏の力をかかげようと、世にさからう者は容赦せぬ。それがわしのやり方じゃ。",
    h:"わしは寺社ともうまくつき合うたが、キリスト教の宣教師には「出ていけ」と命じたこともある(バテレン追放)。世をまとめるには、信仰(しんこう)とも、うまくおりあいをつけねばならぬのよ。",
    i:"わしは、力でおさえつけるより、寺社をうまく治め、学問をすすめて、人の心をおさめる道を選んだ。武力でなく、礼儀(れいぎ)や道理(どうり)でこそ、人の心は静まるのじゃ。" },
  { keys:["商売","しょうばい","経済","けいざい","お金もうけ","貿易","ぼうえき","町を栄え","商いで"],
    n:"わしは楽市楽座で商いを自由にし、関所をなくし、町を栄えさせた。商いがさかんになれば、国も富み、強くなる。古い決まりをこわすことが、富を生むのよ。",
    h:"わしは町をにぎやかにし、貿易にも目をむけた。大坂を商いの中心に育ててな。にぎわい、もうかり、みなが楽しむ――そういう世が、わしは大すきじゃ！",
    i:"わしは江戸を中心に、街道(かいどう)や町を整え、商いと物の流れをよくした。はでにもうけるより、長く安定して栄える土台をきずく。それが、二百六十年の泰平をささえたのじゃ。" },
  { keys:["跡継ぎ","あとつぎ","世継ぎ","よつぎ","あとを継","後継","子に継がせ","あとを誰"],
    n:"わしには信忠(のぶただ)という、たのもしい跡つぎがおった。じゃが本能寺で、わしともども討たれてしもうた……。跡つぎの行く末ばかりは、思いどおりにいかぬものよ。",
    h:"わしは、幼いわが子・秀頼(ひでより)ひとりに天下をたくした。じゃがそれが、わが家のほろびをまねいた……。跡つぎえらびは、天下取りより、よほど難しいものよのう。",
    i:"わしは早くに将軍を三男・秀忠(ひでただ)にゆずり、御三家まで備えた。「天下は代々徳川が継ぐ」と世に示したのよ。一代の栄えより、続く仕組み。そこが、わしの勝因じゃ。" },
  { keys:["なぜ天下","どうやって天下","勝てた理由","成功の理由","天下をとれた","とれなかった理由"],
    n:"わしが道を開けたのは、古いしきたりをおそれず、新しい武器と工夫で、人より速く動いたからよ。じゃが、家臣の心を読みきれず、志なかばで散った。それがわしの限界(げんかい)であった。",
    h:"わしが天下をとれたのは、人より速く動き、人の心をつかんだからじゃ！　知恵と人たらし――これにつきる。ただ、跡つぎを残せなんだのが、わしのただ一つの心残りよ。",
    i:"わしが天下をとれたのは、辛抱づよく待ち、忠義ある家臣にめぐまれ、健康に気をつかって長生きし、約束を守って信用を重ねたから。地道(じみち)な積みかさねが、天下を引きよせたのよ。" },
  { keys:["リーダー","上に立つ","かしら","トップ","指導者","上に立つ者","大将とは"],
    n:"上に立つ者は、だれよりも先を見て、だれよりも速く決断せよ。なまぬるい判断は、家臣をまよわせる。きびしくとも、はっきりと道を示すのが、かしらの務めよ。",
    h:"上に立つ者は、人の心をつかむことよ。こわがられるより、したわれよ。みなが「この人のために働きたい」と思えば、軍はおのずと強くなる。それが、わしのやり方じゃ！",
    i:"上に立つ者は、あせらず、家臣を信じ、長く続く仕組みをつくれ。一度の勝ちより、二度と乱れぬ土台を残すこと。それこそが、まことのかしらの務めよ。" },
  { keys:["スピード","はやさ","速さ","早い","のんびり","せっかち","じっくり","急ぐか待つか"],
    n:"わしは、とにかく速い。決めたら一気に動く。ためらう時こそ、いちばん危うい。世は、先に動いた者のものよ。",
    h:"わしも速さには自信があるぞ！　中国大返しを見たか。じゃがわしは、速さに「人たらし」を足す。速く動いて、心もつかむ。それが秀吉流じゃ！",
    i:"わしは、あえて急がぬ。じっくり見きわめ、勝てる時にだけ動く。速さでは信長どのにも秀吉どのにも及ばぬ。じゃが、最後まで生きのこったのは、このわしであった。" },
  { keys:["うつけ","評判","ひょうばん","変わり者","若いころの評判","ばか者と","笑われ"],
    n:"若いころのわしは、かわった身なりで「尾張のうつけ(ばか者)」と笑われた。じゃが、人にばかにされている間に、わしはじっくり力をたくわえておったのよ。",
    h:"わしは「サル」「はげねずみ」などと呼ばれたものよ。じゃが、ちっとも気にせぬ。見た目より中身、身分より働き。笑われても、最後に勝てばよいのじゃ、はっはっは！",
    i:"わしは人質の身で、地味で目立たぬ子であったろう。じゃが、目立たぬうちに、人の心をよく見て学んでおった。評判など気にせず、こつこつ力をためる――それがよいのよ。" },
  { keys:["ライバル","強敵","きょうてき","好敵手","手ごわい相手","おそれた相手","武田信玄","上杉謙信"],
    n:"わしがおそれた相手か。やはり武田信玄(しんげん)、上杉謙信(けんしん)よ。じゃが二人とも、天下に出る前に世を去った。運もまた、味方であったのよ。",
    h:"わしの手ごわい相手は、なんといっても家康どのよ。小牧・長久手では引き分けでな。だから戦うのをやめ、手を結んだ。かなわぬ相手は、味方にする――それが知恵じゃ！",
    i:"わしが生涯もっともおそれたのは、武田信玄じゃ。三方ヶ原で大敗してな。じゃが、その強さから多くを学んだ。強い敵こそ、最良の先生なのよ。" },
  { keys:["仕えるなら","どの主君","だれに仕え","主君にするなら","部下になるなら","つかえたい"],
    n:"わしに仕えるなら、覚悟せよ。手がらには大きく報いるが、なまけ者やしくじりには、ようしゃせぬ。きびしいが、力ある者ほど、生きがいのある主(あるじ)であろうよ。",
    h:"わしに仕えるなら、楽しいぞ！　よう働けば、身分など関係なく、どんどん引き上げてやる。げんに、はだしの百姓のわしが、人を引き上げてきたのじゃ。夢のある主であろう！",
    i:"わしに仕えるなら、長くつき合うことになる。はでなほうびはすぐには出さぬが、忠義をつくす者は、生涯大切にする。安心して長く仕えられる主――それが、わしよ。" },
  { keys:["怒る","おこる","怒ったとき","かんしゃく","おこりっぽい","気が短い","気が長い"],
    n:"わしは気が短い。なまぬるいことや、しくじりを見ると、雷(かみなり)を落とす。じゃが、それも家臣をひきしめるため。だらけた軍では、戦には勝てぬのよ。",
    h:"わしは、めったに本気では怒らぬ。怒るより、笑ってその場をおさめるほうが、よほど得じゃ。じゃが、千利休のことのように、晩年は気が短くなったのかもしれぬのう……。",
    i:"わしは、怒りをぐっとこらえる。心配ごとがあると爪(つめ)をかむくせがあった、と伝わるほどよ。表に出さず、じっとこらえる――それが、辛抱づよいわしのやり方じゃ。" },
  { keys:["ユーモア","じょうだん","おもしろい","笑い","わらい","明るい","あかるさ","話がうまい"],
    n:"わしは、じょうだんを言う男ではない。むしろ、こわがられるほうよ。じゃが、それでよい。かしらは、したしまれるより、おそれられるほうが、軍はよく動くのじゃ。",
    h:"わしは、明るさと話のうまさが、いちばんの武器じゃ！　笑わせ、よろこばせ、いつのまにか味方にしてしまう。これぞ「人たらし」――敵さえ、わしの前では笑い出すわ、はっはっは！",
    i:"わしは無口で、地味な男よ。明るくふるまう秀吉どのとは、正反対じゃ。じゃが、口数が少なくとも、信用は積みかさねられる。にぎやかさより、たしかさを取るのがわしじゃ。" },
  { keys:["強さの秘密","強さのひみつ","なぜ強い","強さのもと","強さの正体","本当の強さ"],
    n:"わしの強さは、古いしきたりをこわす勇気と、新しい武器を使う頭、そして速さよ。常識をうたがう者だけが、世を変えられるのじゃ。",
    h:"わしの強さは、人の心をつかむ力じゃ！　城も兵も、動かすのは人。その人の心をにぎれば、戦わずして勝てる。人たらしこそ、わしのまことの強さよ。",
    i:"わしの強さは、辛抱と健康と信用よ。はでな才より、地道な積みかさね。負けても折れず、待ちつづける――それが、最後にものを言う、まことの強さなのじゃ。" },
  { keys:["一番の手がら","最大の功績","いちばんの功績","一番すごいこと","自慢","じまん","一番の自慢"],
    n:"わしの一番の手がらは、古い世をこわし、天下統一への道を切りひらいたことよ。楽市楽座、鉄砲、安土城――新しき世への土台は、すべてわしがまいた種じゃ。",
    h:"わしの最大の手がらは、なんといっても天下統一をなしとげたこと！　はだしの百姓から、天下人へ――この大出世そのものが、わしの一番の自慢じゃ、はっはっは！",
    i:"わしの最大の功績は、二度と乱れぬ江戸幕府を開き、約二百六十年の天下泰平をきずいたことよ。勝って終わりではない。守って続けてこそ、まことの天下統一じゃ。" },
  { keys:["もし生きていたら","もし長生き","生きていれば","もっと生きて","死なずに"],
    n:"もしわしが本能寺で散らず、生きておれば……天下統一は、わしの手で、もっと早くなしとげていたであろう。じゃが、歴史に「もし」はない。あとは秀吉と家康に、たくしたのよ。",
    h:"もしわしがもっと長生きして、秀頼が大人になるまで生きておれば……わが豊臣の世は、続いたかもしれぬ。じゃが、こればかりは、寿命(じゅみょう)には勝てなんだのう。",
    i:"わしは長生きしたからこそ、天下を手にできた。もし早く死んでおれば、徳川の世はなかったろう。長生きそのものが、わしの勝因。だからこそ、健康を何より大事にしたのじゃ。" },
  { keys:["今の世","現代","げんだい","いまの日本","タイムスリップ","令和","いまの世"],
    n:"いまの世は、新しいものにあふれ、世界とつながっておると聞く。古いしきたりをこわし、新しきを取り入れる――わしの好みの世よ。生まれるのが、早すぎたかのう。",
    h:"いまの世は、にぎやかで、楽しいことが多いと聞く。身分にしばられず、だれもが上を目ざせるとな。はだしから天下人になったわしには、たまらぬ世よ。行ってみたいわ！",
    i:"いまの世は、刀のいらぬ、争いの少ない世と聞く。わしの目ざした「天下泰平」の、ずっと先のすがたかもしれぬ。子らが学び、笑うて暮らせる世――それを見てみたいのじゃ。" },
  { keys:["子どもたちへ","みんなへ","応援","おうえん","がんばって","学ぶみんな","メッセージみんな"],
    n:"学ぶみんなへ。だれもやらぬことに、まっ先に手をつけよ。失敗をおそれるな。世を変えるのは、いつだって、常識をこえる勇気ある者よ。",
    h:"学ぶみんなへ。明るく、あきらめず、人にやさしくな！　身分や生まれで、自分を小さく決めつけるな。工夫と元気があれば、道はどこまでも開ける。わしが、その証じゃ！",
    i:"学ぶみんなへ。あせらず、こつこつ続けよ。一度の負けで、あきらめるな。健康を大事にし、約束を守れ。すぐに結果が出のうても、続ける者が、最後に実を結ぶのじゃ。" },
  { keys:["戦国時代","せんごくじだい","どんな時代","いつの時代","乱世","らんせ","時代","戦国とは"],
    n:"戦国とは、力ある者が、力で天下を争う世よ。古い権威はくずれ、実力だけが、ものを言う。わしのような者が世に出られたのも、この乱世(らんせい)のおかげじゃ。",
    h:"戦国は、はげしくも、おもしろい世よ！　身分のひくい者でも、腕一つでのし上がれる。げんに、わしがそうじゃ。乱世は、夢を見る者には、またとない世であったのう。",
    i:"わしは、戦の絶えぬ戦国の世に生まれ、それを終わらせて、平和な江戸の世をひらいた。いわば、戦の世と平和の世のかけ橋(はし)よ。乱世を知るからこそ、泰平のありがたさが分かるのじゃ。" },
  { keys:["同盟","どうめい","手を結ぶ","約束","やくそく","協定","結びつき","味方をつくる"],
    n:"わしは家康と清洲同盟を結び、二十年あまり守った。約束を守ることが信用を生み、力になる。同盟は、口先だけでは続かぬ。いざという時、力を貸しあってこそよ。",
    h:"わしは、敵さえも同盟相手に変えるのが得意じゃ！　家康どのとも、戦ったのちに手を結んだ。妹や母まで送ってな。味方をふやす力こそ、天下取りの近道よ。",
    i:"わしは清洲同盟を生涯守りぬいた。約束を守りぬくこと――それがわしの信用を生み、力を大きくした。一度の得より、長い信用を取る。それが、わしの生き方じゃ。" },
  { keys:["裏切られたら","裏切られた時","どう対応","だまされたら","信じた人に"],
    n:"裏切りには、容赦(ようしゃ)せぬ。きびしく罰し、二度と起こさぬよう示す。じゃが――わしも光秀を読みきれなんだ。裏切りを防ぐのは、まことに難しいことよ。",
    h:"裏切られても、わしは笑ってゆるし、味方に変えてしまうことが多かったわ。追いつめるより、ふところに入れる。そのほうが、よほど得じゃ。人の心は、こわすより、つかむものよ。",
    i:"わしも、家臣に刃向かわれた苦しみを知っておる。じゃが、その者をゆるし、再び召しかかえもした。きびしく罰するだけが道ではない。人を信じ、長くつき合う器(うつわ)も、また力よ。" },
  { keys:["お酒","おさけ","酒","宴会","うたげ","酒盛り","飲み会","宴"],
    n:"わしは宴(うたげ)を、家臣をねぎらう場として使うた。茶の湯も、相撲もな。じゃが、ただ飲んで酔うためではない。すべては、家臣の心をつかむための工夫よ。",
    h:"わしは宴(うたげ)が大すきじゃ！　大ぜいで飲んで、歌うて、踊って――醍醐(だいご)の花見は、それはみごとな大宴会であった。みなが笑う場をつくるのが、わしのよろこびよ！",
    i:"わしは、はでな宴(うたげ)は好まぬ。酒もほどほどよ。健康を第一に考えるからのう。にぎやかさより、静かに健やかに過ごす――それが、長生きのこつなのじゃ。" },
  { keys:["名言","めいげん","辞世","じせい","最期の言葉","最後の言葉","死ぬとき","死ぬ前","死ぬまえ","ことば","のこした言葉","座右の銘"],
    n:"わしは桶狭間の前に「人間五十年(にんげんごじゅうねん)……」と『敦盛(あつもり)』を舞うたと伝わる。人の世のはかなさを胸に、それでも、わしは戦に出たのよ。",
    h:"わしの辞世(じせい)は「露(つゆ)と落ち露と消えにしわが身かな なにわのことも夢のまた夢」――栄華をきわめたわが一生も、夢のまた夢であった、という意味よ。さびしくも、美しいであろう。",
    i:"わしの言葉として「人の一生は、重荷(おもに)を負(お)うて遠き道を行くがごとし。いそぐべからず」と伝わる。人生は重い荷をせおって長い道を歩むようなもの。あせらず一歩ずつ――わしらしい言葉よ。" },
  { keys:["評価","ひょうか","後の世","のちのよ","どう見られ","世間の見方","良い悪い","悪人か"],
    n:"わしは「革命児」とたたえられる一方、「むごい」とも言われる。比叡山を焼いたゆえな。よい悪いは、後の世の人が、自分で考えるがよい。わしは、わしの道を行っただけよ。",
    h:"わしは「出世の英雄」と人気じゃが、晩年の朝鮮出兵では「行きすぎた」とも言われる。人には、よい面も、わるい面もある。一つの見方で決めつけぬことよ。",
    i:"わしは「平和をきずいた人」とたたえられる一方、「ずるい」「冷たい」とも言われる。子を死なせ、豊臣をほろぼしたゆえな。人物の見方は、一つではない。両の目で見ておくれ。" },
  { keys:["苦手","にがて","弱点","じゃくてん","できないこと","だめなところ","短所"],
    n:"わしの弱点は、気が短く、家臣の心を読みきれなんだことよ。きびしさが、人を追いつめた。それが、本能寺の悲劇につながったのかもしれぬ。",
    h:"わしの弱点は、跡つぎを残せなんだこと、そして晩年の行きすぎ(朝鮮出兵)よ。明るさと勢いで来た男じゃが、最後のしまつだけは、うまくいかなんだのう。",
    i:"わしの弱点か……地味で、はでさがないことよ。じゃが、それでよい。はなやかな者は早く散り、地味な者が最後に生きのこる。弱点と見えて、それがわしの強みであったのじゃ。" },
  { keys:["大切な人を失","身近な人の死","家族を失","かなしみ","悲しみ","つらい別れ","失う"],
    n:"わしは、たのもしい跡つぎ・信忠(のぶただ)を、本能寺で同時に失うた。一族のかなめを、一度に失う痛みよ。天下を目前にしての、無念であった。",
    h:"わしは、待ち望んだ最初のわが子を、幼くして失うた悲しみを知っておる。明るくふるまうわしも、心の奥には、深い悲しみをかかえておったのよ。",
    i:"わしは、妻と長男・信康を、同盟のために失わねばならなんだ。親が子に死を命じる――これほどの痛みはない。生涯わすれられぬ、わしの心の傷よ。" },
  { keys:["これからの日本","未来","みらい","これからの世","のこしたいこと","伝えたいこと","最後に"],
    n:"これからの世へ。古きにとらわれず、つねに新しきへ進め。世界に目をむけよ。変わることをおそれぬ者だけが、未来をひらくのじゃ。",
    h:"これからの世へ。身分や生まれにしばられず、だれもが夢を見られる世であってほしい。明るく、たくましく、人にやさしく――それが、はだしから立ったわしの願いよ。",
    i:"これからの世へ。何より、争いのない平和を大切にしておくれ。わしがきずいた二百六十年の泰平は、その尊(とうと)さを教えておる。あせらず、たしかに、よき世を続けてゆくのじゃ。" },

  // ---- 追加の人物・できごと ----
  { keys:["濃姫","のうひめ","帰蝶","きちょう","信長の妻","斎藤道三","まむし"],
    n:"わしの正室・濃姫(のうひめ、帰蝶)は、美濃の斎藤道三(さいとうどうさん)の娘よ。敵対する家との、政略の結婚であった。道三は「まむし」と呼ばれた、したたかな男であったがな。",
    h:"信長さまの奥方・濃姫は、美濃の道三どのの娘。あの結婚で、信長さまは美濃と結びついた。武将の結婚は、家と家を結ぶ大事な手じゃ。わしも、それはよう使うたわ。",
    i:"信長どのの濃姫との結婚も、わしの数々の縁組(えんぐみ)も、みな家と家を結ぶ政略よ。血のつながりであちこちと手を結び、家を安定させる。戦国の大名の、大事な知恵じゃ。" },
  { keys:["お市","おいち","市","信長の妹","美人","浅井長政","あざい"],
    n:"わが妹・お市(おいち)は、絶世の美女と伝わる。浅井長政(あざいながまさ)にとつがせたが、その浅井がわしにそむき――妹を、敵の妻にしてしまう、つらい思いもしたのよ。",
    h:"お市さまの美しさは、世に名高い。その娘・茶々(ちゃちゃ)が、のちにわしの側室・淀殿(よどどの)じゃ。信長さまの血は、めぐりめぐって、わが豊臣にもつながったのよ。ふしぎな縁よのう。",
    i:"お市の方の娘たちは、それぞれ大名に嫁(とつ)ぎ、戦国の世を生きた。三人の娘のうち一人は、のちのわが二代将軍・秀忠(ひでただ)の妻となった。血のつながりとは、ふしぎにめぐるものよ。" },
  { keys:["金ヶ崎","かねがさき","退き口","のきぐち","しんがり","殿","退却","逃げる役"],
    n:"金ヶ崎(かねがさき)で、わしは浅井の裏切りにあい、急いで退いた。そのとき、いちばん危険な「しんがり(殿、最後尾を守る役)」をつとめたのが、秀吉よ。命がけの働きであった。",
    h:"金ヶ崎の退き口(のきぐち)で、わしは命がけのしんがり(殿)をつとめた！　逃げる軍の、いちばん後ろを守る、最も危険な役よ。あの働きで、わしは信長さまに、ぐっと見こまれたのじゃ！",
    i:"金ヶ崎では、わしも信長どのとともに退いた。あの危地で、秀吉どのがしんがりをみごとに果たした。命がけの役を買って出る――あの度胸と働きが、秀吉どのを引き上げたのよ。" },
  { keys:["備中高松","びっちゅう","水攻め","みずぜめ","城を水で","清水宗治"],
    n:"城を水でかこむ「水攻め(みずぜめ)」とは、秀吉が備中高松城(びっちゅうたかまつじょう)でやってのけた、おどろきの戦法よ。血を流さず、知恵で城を落とす。あの男らしいやり方じゃ。",
    h:"わしは備中高松城を、まわりに堤(つつみ)を築いて水でかこみ、湖(みずうみ)の中の城にしてしまった！　力ずくより、知恵で勝つ。これぞ、秀吉流の戦よ。ちょうどその最中(さなか)に、本能寺の報せが届いたのじゃ。",
    i:"秀吉どのの水攻めは、まことにみごとな知恵いくさよ。血をなるべく流さず、城を落とす。力でなく工夫で勝つ――そこは、無理をせぬわしと、通じるところがあるのう。" },
  { keys:["小牧長久手","こまきながくて","小牧・長久手","家康と秀吉の戦い","引き分け"],
    n:"わしの死後、秀吉と家康が小牧・長久手で戦うたと聞く。天下人となった秀吉に、家康がひるまず立ち向かい、引き分けに持ちこんだ。家康、あなどれぬ男よ。",
    h:"小牧・長久手では、家康どのに手を焼いたわ。戦では決着がつかなんだ。そこでわしは、戦うのをやめ、妹や母まで送って和を結んだのじゃ。かなわぬ相手は、味方にする――それが知恵よ！",
    i:"小牧・長久手で、わしは秀吉どのの大軍を相手に、ひけを取らなんだ。じゃが、天下の流れを見て、わしは秀吉どのに臣従(しんじゅう)した。引くべき時に引く。それも、辛抱の一つよ。" },
  { keys:["北政所","きたのまんどころ","ねね","おね","秀吉の正室","糟糠の妻"],
    n:"秀吉の妻・ねね(北政所)は、貧しいころから連れそうた、よき女房よ。出世しても、その妻を大事にしたところは、あの男の、人としての温かさであろうな。",
    h:"わしの妻・ねね(北政所、きたのまんどころ)は、わしが何もないころから連れそうてくれた、かけがえのない女房じゃ。出世しても、あれだけは、生涯大切にしたわ。よき妻にめぐまれたのよ。",
    i:"秀吉どのの正室・北政所どのは、しっかりとした、たよれる女性よ。秀吉どのの死後も、世のおちつきを願うておられた。よき妻は、家をささえる大きな力なのじゃ。" },
  { keys:["惣無事令","そうぶじれい","私戦禁止","大名の戦いを禁","勝手に戦うな"],
    n:"大名どうしが勝手に戦うことを禁じる――そんな大きな決まりは、秀吉が「惣無事令(そうぶじれい)」として出した。天下人だからこそ出せる命令よ。世がまとまってきた、ということじゃのう。",

const SCHIPS = ["鳴かぬなら","三人の性格","人の使い方","お金の使い方","新しいもの","本能寺の変","桶狭間の戦い","関ヶ原の戦い","天下統一","一番強いのは","三人のちがい","学んでほしいこと"];
function findSCompare(text){
  const t=(text||"").replace(/\s/g,"");
  if(!t) return null;
  let best=null,bestScore=0;
  for(const item of SCOMPARE){
    let score=0;
    for(const k of item.keys){ if(t.includes(k)) score+=k.length; }
    if(score>bestScore){bestScore=score;best=item;}
  }
  return bestScore>0?best:null;
}
const sCards=document.getElementById('sCards');
const sqEl=document.getElementById('sq');
function renderSCompare(text){
  const item=findSCompare(text);
  if(!item){
    sCards.innerHTML=`<div class="cmp-empty">三人とも、そろって首をかしげておる……。言葉を変えて、もう一度きいてみておくれ。たとえば「鳴かぬなら」「人の使い方」「本能寺」「関ヶ原」「お金」などはどうじゃ？</div>`;
    return;
  }
  let html="";
  SCHARS.forEach((c,idx)=>{
    const ans=item[c.id];
    html+=
      `<div class="cmp-card" style="--cc:${c.color};animation-delay:${idx*0.12}s">
         <div class="cmp-face" id="scf-${c.id}">
           <img src="${c.img}" alt="${c.name}" onerror="document.getElementById('scf-${c.id}').classList.add('no-img')">
           <span class="cmp-face-fb">${c.fb}</span>
         </div>
         <div class="cmp-body">
           <div class="cmp-name">${c.name}</div>
           <div class="cmp-text">${ans}</div>
         </div>
       </div>`;
  });
  sCards.innerHTML=html;
}
let sengokuInited=false;
function initSengoku(){
  const w=document.getElementById('sChips');
  w.innerHTML=SCHIPS.map(c=>`<button class="chip">${c}</button>`).join("");
  w.querySelectorAll('.chip').forEach(b=>{ b.onclick=()=>{ sqEl.value=b.textContent; renderSCompare(b.textContent); }; });
  sCards.innerHTML=`<div class="cmp-empty">同じ質問でも、信長・秀吉・家康では答えがちがう。上のますに質問を入れて「きく」を押すか、下のボタンをえらんでみよ。<br><small>※三人は同じ戦国の世を生きた仲間（信長→秀吉→家康の順に天下への道をつなぎました）。自分が直接かかわっていないできごとも、それぞれの立場から語ります。</small></div>`;
  let comp=false;
  sqEl.addEventListener('compositionstart',()=>{comp=true;});
  sqEl.addEventListener('compositionend',()=>{comp=false;});
  document.getElementById('sAskBtn').onclick=()=>renderSCompare(sqEl.value);
  sqEl.addEventListener('keydown',e=>{ if(e.key==='Enter' && !comp && !e.isComposing){ renderSCompare(sqEl.value); } });
  sengokuInited=true;
}
