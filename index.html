<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家康くん 〜戦国ものしり問答〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#13160f;       /* 墨（深緑がかった黒） */
    --sumi2:#1c2116;
    --kin:#c9a84a;        /* 金 */
    --kin-akarui:#ecd27e;
    --aoi:#5c8a52;        /* 葵の緑 */
    --aoi-fuka:#3a5c34;   /* 深緑 */
    --aka:#9c4632;        /* 朱（落ち着いた） */
    --aka-fuka:#6e2f20;
    --washi:#f4ead6;      /* 和紙 */
    --washi-kage:#e7d8ba;
    --sumi-usu:rgba(244,234,214,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #28341f 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #1b2414 0%, transparent 55%),
      var(--sumi);
    color:var(--washi);
    min-height:100%;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }
  /* 和紙テクスチャ風のノイズ */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    pointer-events:none;z-index:0;
  }

  /* ヘッダー（のぼり旗風） */
  header{
    position:relative;z-index:2;
    text-align:center;
    padding:18px 16px 10px;
    border-bottom:3px solid var(--kin);
    background:linear-gradient(180deg, rgba(58,92,52,.4), transparent);
  }
  .mon{
    display:inline-flex;align-items:center;gap:14px;
  }
  .mon-maru{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--kin);
    display:grid;place-items:center;
    font-family:'Yuji Syuku',serif;font-size:24px;color:var(--kin-akarui);
    background:radial-gradient(circle,#28341f,#13160f);
  }
  h1{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(28px,4.2vw,52px);
    color:var(--kin-akarui);
    letter-spacing:.12em;
    text-shadow:0 2px 0 #000,0 0 18px rgba(201,168,74,.35);
  }
  .sub{
    font-size:clamp(13px,1.5vw,18px);
    color:var(--sumi-usu);
    margin-top:4px;letter-spacing:.18em;
  }

  /* メイン舞台 */
  main{
    position:relative;z-index:2;
    flex:1;
    width:min(1100px,94vw);
    margin:0 auto;
    padding:22px 0 30px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* 家康の語り場 */
  .stage{
    display:flex;align-items:flex-start;gap:22px;
  }
  .ieyasu{
    flex:0 0 auto;
    width:clamp(120px,15vw,180px);
    text-align:center;
  }
  .face{
    width:clamp(120px,15vw,180px);
    height:clamp(120px,15vw,180px);
    border-radius:50%;
    overflow:hidden;
    background:#1c2116;
    border:5px solid var(--kin);
    box-shadow:0 0 0 4px var(--sumi),0 10px 30px rgba(0,0,0,.5);
    position:relative;
    transition:transform .25s;
  }
  .face img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .face-fallback{
    display:none;
    width:100%;height:100%;
    align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;
    font-size:clamp(20px,2.6vw,32px);line-height:1.15;
    color:var(--kin-akarui);letter-spacing:.05em;
    background:radial-gradient(circle at 50% 38%, #28341f, #13160f);
  }
  .face.no-img .face-fallback{display:flex;}
  .face.talk{animation:nod .6s ease;}
  @keyframes nod{0%,100%{transform:translateY(0)}30%{transform:translateY(6px) rotate(-2deg)}60%{transform:translateY(0) rotate(2deg)}}
  .name-tag{
    margin-top:10px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,24px);color:var(--kin-akarui);letter-spacing:.1em;
  }

  /* 吹き出し（巻物風） */
  .scroll{
    flex:1;position:relative;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);
    border-radius:14px;
    padding:26px 30px;
    min-height:170px;
    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 3px rgba(58,92,52,.3);
    border:2px solid var(--kin);
  }
  .scroll::before{ /* 吹き出しのしっぽ */
    content:"";position:absolute;left:-18px;top:48px;
    border-style:solid;border-width:14px 18px 14px 0;
    border-color:transparent var(--kin) transparent transparent;
  }
  .scroll .answer{
    font-family:'Klee One',serif;
    font-size:clamp(20px,2.6vw,32px);
    line-height:1.75;font-weight:600;
    letter-spacing:.02em;
  }
  .scroll .answer .em{color:var(--aoi-fuka);font-weight:700;}
  .cursor{display:inline-block;width:.5em;background:var(--aoi);animation:blink .7s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}

  /* 質問エリア */
  .ask-zone{
    background:rgba(28,33,22,.7);
    border:2px solid var(--kin);
    border-radius:14px;
    padding:18px 20px;
  }
  .ask-zone .label{
    font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);
    margin-bottom:12px;letter-spacing:.1em;font-weight:700;
  }
  .input-row{display:flex;gap:12px;flex-wrap:wrap;}
  #q{
    flex:1;min-width:220px;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:clamp(18px,2.2vw,26px);font-weight:500;
    padding:14px 18px;border-radius:10px;border:none;
    background:var(--washi);color:var(--sumi);
  }
  #q:focus{outline:3px solid var(--kin-akarui);}
  .btn-ask{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(18px,2.2vw,26px);
    padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aoi),var(--aoi-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #25401f,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-ask:active{transform:translateY(4px);box-shadow:0 1px 0 #25401f;}

  /* ===== モード切り替え（のれん風タブ） ===== */
  .mode-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
  .mode-btn{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(15px,1.9vw,22px);letter-spacing:.1em;
    padding:10px 22px;border-radius:10px 10px 0 0;cursor:pointer;
    background:rgba(28,33,22,.55);
    color:var(--sumi-usu);
    border:2px solid rgba(201,168,74,.35);border-bottom:none;
    transition:all .15s;
  }
  .mode-btn:hover{color:var(--kin-akarui);}
  .mode-btn.active{
    background:linear-gradient(180deg,var(--aoi),var(--aoi-fuka));
    color:var(--washi);border-color:var(--kin);
    box-shadow:0 -3px 12px rgba(92,138,82,.4);
  }
  .panel{display:none;}
  .panel.show{display:block;}

  /* 顔のリアクション */
  .face.seikai{animation:nod .6s ease;box-shadow:0 0 0 4px var(--sumi),0 0 34px 6px rgba(201,168,74,.85),0 10px 30px rgba(0,0,0,.5);}
  .face.zannen{animation:shake .5s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px) rotate(-2deg)}40%{transform:translateX(7px) rotate(2deg)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

  /* ===== クイズ ===== */
  .quiz-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-bottom:14px;flex-wrap:wrap;
  }
  .quiz-count{font-family:'Yuji Syuku',serif;font-size:clamp(15px,1.8vw,22px);color:var(--kin-akarui);letter-spacing:.08em;}
  .quiz-score{font-size:clamp(15px,1.8vw,22px);color:var(--washi);font-weight:700;}
  .quiz-score b{color:var(--kin-akarui);}
  .choices{display:flex;flex-direction:column;gap:12px;}
  .choice{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(18px,2.3vw,28px);text-align:left;
    padding:16px 22px;border-radius:12px;cursor:pointer;
    background:var(--washi);color:var(--sumi);
    border:3px solid var(--kin);
    box-shadow:0 4px 0 rgba(58,92,52,.35);
    transition:transform .08s,background .15s;
  }
  .choice:hover{background:var(--kin-akarui);transform:translateY(-2px);}
  .choice:disabled{cursor:default;opacity:.92;transform:none;}
  .choice.correct{background:#5c8a52;color:#fff;border-color:#7fae66;}
  .choice.wrong{background:#9c4632;color:#fff;border-color:#c46a5e;}
  .choice .mark{font-family:'Yuji Syuku',serif;margin-right:.4em;color:var(--aoi-fuka);}
  .choice.correct .mark,.choice.wrong .mark{color:#fff;}
  .quiz-next{
    margin-top:16px;display:none;width:100%;
    font-family:'Yuji Syuku',serif;font-size:clamp(18px,2.2vw,26px);
    padding:14px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--kin),#a8852f);color:var(--sumi);
    letter-spacing:.12em;box-shadow:0 4px 0 #6a5512;
  }
  .quiz-next:active{transform:translateY(4px);box-shadow:0 1px 0 #6a5512;}
  .quiz-next.show{display:block;}

  /* ===== 年表 ===== */
  .tl-label{font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);margin-bottom:14px;letter-spacing:.1em;font-weight:700;}
  .timeline{
    display:flex;gap:14px;overflow-x:auto;padding:6px 2px 16px;
    scroll-snap-type:x proximity;
  }
  .timeline::-webkit-scrollbar{height:10px;}
  .timeline::-webkit-scrollbar-thumb{background:var(--kin);border-radius:999px;}
  .tl-item{
    flex:0 0 auto;width:clamp(150px,18vw,200px);
    scroll-snap-align:start;cursor:pointer;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);border:2px solid var(--kin);border-radius:12px;
    padding:14px 14px 16px;text-align:center;
    box-shadow:0 6px 16px rgba(0,0,0,.35);
    transition:transform .12s,box-shadow .12s;position:relative;
  }
  .tl-item::after{
    content:"";position:absolute;right:-15px;top:50%;width:14px;height:3px;
    background:var(--kin);
  }
  .tl-item:last-child::after{display:none;}
  .tl-item:hover{transform:translateY(-4px);box-shadow:0 10px 22px rgba(0,0,0,.5);}
  .tl-item.active{outline:4px solid var(--kin-akarui);}
  .tl-year{
    font-family:'Yuji Syuku',serif;font-size:clamp(20px,2.4vw,30px);
    color:var(--aoi-fuka);letter-spacing:.04em;
  }
  .tl-age{font-size:clamp(12px,1.3vw,15px);color:#5a6b3d;margin:2px 0 8px;}
  .tl-title{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(15px,1.7vw,20px);line-height:1.4;}

  /* ===== 地図（本物の日本地図SVG） ===== */
  .map-label{font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);margin-bottom:6px;letter-spacing:.08em;font-weight:700;}
  .map-sub{font-size:clamp(12px,1.4vw,16px);color:var(--sumi-usu);margin-bottom:14px;letter-spacing:.05em;}
  .map-wrap{
    position:relative;width:100%;
    background:radial-gradient(ellipse at 55% 45%, #243018, #11160d);
    border:2px solid var(--kin);border-radius:12px;
    overflow:hidden;
  }
  .map-wrap svg{display:block;width:100%;height:auto;}
  /* 県のぬり（地方別のうすい色／家康ゆかりの国を強調） */
  #japanMapSvg .prefecture polygon,
  #japanMapSvg .prefecture path{
    fill:#cdbb8e;stroke:#7a6a3e;stroke-width:.4;stroke-linejoin:round;
  }
  /* ゆかりの国（三河=愛知, 遠江駿河=静岡, 武蔵=東京, 美濃=岐阜） */
  #japanMapSvg .prefecture[data-code="23"] polygon,
  #japanMapSvg .prefecture[data-code="22"] polygon,
  #japanMapSvg .prefecture[data-code="22"] path,
  #japanMapSvg .prefecture[data-code="13"] polygon,
  #japanMapSvg .prefecture[data-code="21"] polygon{ fill:#8fae6e; }
  /* 京・大坂のあたり（参考） */
  #japanMapSvg .prefecture[data-code="26"] polygon,
  #japanMapSvg .prefecture[data-code="27"] polygon{ fill:#c8a06a; }
  #japanMapSvg .boundary-line{ display:none; }

  /* ルート線・参考地点・ピン（viewBox拡大に合わせ小さめの値） */
  .map-route{fill:none;stroke:var(--kin-akarui);stroke-width:1.2;stroke-dasharray:3 2.5;opacity:.85;stroke-linejoin:round;}
  #japanMapSvg .ref-dot{fill:rgba(244,234,214,.5);}
  #japanMapSvg .ref-name{
    font-family:'Zen Maru Gothic',sans-serif;font-size:5px;font-weight:700;
    fill:rgba(244,234,214,.7);text-anchor:middle;
    paint-order:stroke;stroke:#11160d;stroke-width:1px;stroke-linejoin:round;
  }
  .map-pin{cursor:pointer;}
  .map-pin .pin-dot{fill:var(--kin);stroke:#fff;stroke-width:.7;transition:r .15s,fill .15s;}
  .map-pin:hover .pin-dot{fill:var(--kin-akarui);}
  .map-pin.active .pin-dot{fill:var(--aka);r:8;}
  .map-pin .pin-num{
    font-family:'Yuji Syuku',serif;font-size:6px;fill:var(--sumi);
    text-anchor:middle;dominant-baseline:central;pointer-events:none;font-weight:700;
  }
  .map-pin.active .pin-num{fill:#fff;}
  .map-pin .pin-name{
    font-family:'Zen Maru Gothic',sans-serif;font-size:6.5px;font-weight:700;
    fill:var(--washi);text-anchor:middle;paint-order:stroke;
    stroke:#11160d;stroke-width:1.6px;stroke-linejoin:round;pointer-events:none;
  }
  .map-pin.active .pin-name{fill:var(--kin-akarui);}
  .map-steps{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .map-step{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(13px,1.6vw,18px);
    padding:9px 15px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.08);color:var(--washi);
    border:2px solid var(--kin);transition:all .15s;
    display:flex;align-items:center;gap:7px;
  }
  .map-step .step-no{
    display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;
    background:var(--kin);color:var(--sumi);font-family:'Yuji Syuku',serif;font-size:13px;
  }
  .map-step:hover{background:var(--kin);color:var(--sumi);transform:translateY(-2px);}
  .map-step:hover .step-no{background:var(--sumi);color:var(--kin-akarui);}
  .map-step.active{background:linear-gradient(180deg,var(--aoi),var(--aoi-fuka));border-color:var(--kin-akarui);}

  footer{
    position:relative;z-index:2;text-align:center;
    font-size:13px;color:rgba(244,234,214,.4);
    padding:14px;letter-spacing:.1em;
  }
  @media(max-width:560px){
    .stage{flex-direction:column;align-items:center;}
    .scroll::before{display:none;}
    .ieyasu{order:-1;}
  }
</style>
</head>
<body>
  <header>
    <div class="mon">
      <span class="mon-maru">徳</span>
      <div>
        <h1>家康くん</h1>
        <div class="sub">せんごく ものしり もんどう</div>
      </div>
      <span class="mon-maru">川</span>
    </div>
  </header>

  <main>
    <div class="mode-bar">
      <button class="mode-btn active" data-mode="qa">もんどう</button>
      <button class="mode-btn" data-mode="quiz">家康クイズ</button>
      <button class="mode-btn" data-mode="timeline">年表</button>
      <button class="mode-btn" data-mode="map">地図</button>
    </div>

    <div class="stage">
      <div class="ieyasu">
        <div class="face" id="face">
          <img src="https://raw.githubusercontent.com/byakusen/dfgeoge.ieyasu_gazou/main/ieyasu.png" alt="徳川家康"
               onerror="this.style.display='none';this.parentNode.classList.add('no-img');">
          <span class="face-fallback">徳<br>川<br>家<br>康</span>
        </div>
        <div class="name-tag">徳川家康</div>
      </div>
      <div class="scroll">
        <div class="answer" id="answer"></div>
      </div>
    </div>

    <div class="panel show" id="panel-qa">
      <div class="ask-zone">
        <div class="label">▼ 家康くんに きいてみよう</div>
        <div class="input-row">
          <input id="q" type="text" placeholder="しつもんを 入力してね（れい：関ヶ原の戦いってなに？）" autocomplete="off">
          <button class="btn-ask" id="askBtn">きく</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-quiz">
      <div class="ask-zone">
        <div class="quiz-head">
          <span class="quiz-count" id="quizCount">第1問</span>
          <span class="quiz-score">正解 <b id="quizRight">0</b> / <span id="quizDone">0</span>問</span>
        </div>
        <div class="choices" id="choices"></div>
        <button class="quiz-next" id="quizNext">つぎの問題へ ▶</button>
      </div>
    </div>

    <div class="panel" id="panel-timeline">
      <div class="ask-zone">
        <div class="tl-label">▼ 年表の札をタップすると、家康がそのできごとを語るぞ</div>
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <div class="panel" id="panel-map">
      <div class="ask-zone">
        <div class="map-label">▼ 家康の住んだ場所（本拠地）のうつりかわり</div>
        <div class="map-sub">下の札か、地図の印をタップすると、家康がその土地を語るぞ</div>
        <div class="map-wrap" id="mapWrap"></div>
        <div class="map-steps" id="mapSteps"></div>
      </div>
    </div>
  </main>

  <footer>クラスで楽しむ 戦国もんどうアプリ／答えは小学生むけにやさしくまとめています</footer>

<script>
// ===== 家康の知識（小学4年生むけ・家康口調） =====
// キーワードに当てはまる問いが来たら、その答えを返す。
const KB = [
  // ===== 生い立ち・名前 =====
  {keys:["生まれ","うまれ","いつ生","何年生","誕生","岡崎城で生","どこで生"],
   a:"わしが生まれたのは1542年、三河国(みかわのくに、いまの愛知県)の岡崎城(おかざきじょう)じゃ。父は松平広忠(まつだいらひろただ)、母は於大の方(おだいのかた)。松平家のあとつぎとして、この世に生をうけたのよ。"},
  {keys:["幼名","ようみょう","竹千代","たけちよ","子どもの名","小さいころの名"],
   a:"子どものころのわしの名は「竹千代(たけちよ)」というのじゃ。松平家では、あとつぎの子に代々この名をつけてな。やがて大人になり、いくつもの名を経て「徳川家康」となったのよ。"},
  {keys:["名前","なまえ","名のり","名前が変わ","元信","元康","もとのぶ","もとやす","改名"],
   a:"わしの名は何度も変わった。竹千代→元信(もとのぶ)→元康(もとやす)、そして1563年に「家康」と名のった。さらに1566年には「松平」から「徳川」へと姓を改めたのじゃ。名を変えるたびに、わしの立場も大きく変わっていったのよ。"},
  {keys:["徳川","とくがわ","松平から","姓を変え","改姓","なぜ徳川"],
   a:"わしはもともと「松平(まつだいら)」という姓であった。1566年、朝廷(ちょうてい)の許しを得て「徳川(とくがわ)」と名のり、三河守(みかわのかみ)という位ももらった。これでわしは、三河を治める一人前の大名として認められたのじゃ。"},
  {keys:["父","ちち","おとう","広忠","ひろただ"],
   a:"わしの父は松平広忠(まつだいらひろただ)じゃ。三河の岡崎城の主であったが、まわりを今川や織田といった大きな勢力にはさまれ、苦労の絶えぬ人であった。わしが幼いころに亡くなってしもうてな。父の顔を、わしはあまり覚えておらぬのよ。"},
  {keys:["母","はは","おかあ","於大","おだい","伝通院"],
   a:"わしの母は於大の方(おだいのかた)じゃ。じゃが、母の実家・水野家が織田方につき、今川方の父とは敵味方に分かれてしもうた。そのため両親は離縁(りえん)し、わしは3さいで母と生き別れたのよ。のちに再会できたのは、何よりのよろこびであった。"},
  {keys:["松平","まつだいら","三河","みかわ","松平家"],
   a:"わしの家・松平家は、三河国(いまの愛知県東部)の土地を治める一族じゃ。けっして大きくはなかったが、家臣たちの忠義は天下一であった。この三河武士(みかわぶし)こそ、わしの一生をささえてくれた、いちばんの宝よ。"},

  // ===== 人質時代 =====
  {keys:["人質","ひとじち","幼少","おさないころ","つらい子ども","苦労した子ども"],
   a:"わしの子ども時代はな、人質(ひとじち)として他家(たけ)で過ごす、つらいものであった。はじめは織田家、つぎは今川家でな。じっと辛抱(しんぼう)し、人の心をよく見て学んだ。あのつらい日々が、辛抱づよいわしをつくったのじゃ。"},
  {keys:["織田の人質","織田家","熱田","あつた","戸田","裏切り","奪われ"],
   a:"6さいのとき、今川へ送られるはずが、護送(ごそう)の途中で裏切りにあい、わしは織田家へ送られてしもうた。尾張(おわり)の熱田(あつた)で2年あまり過ごしたのじゃ。この織田家こそ、のちに同盟を結ぶ織田信長の家であった。世のえにしとは、ふしぎなものよ。"},
  {keys:["今川の人質","今川家","駿府","すんぷ","義元のもと"],
   a:"その後わしは人質を交かんされ、今川家のもと、駿府(すんぷ、いまの静岡市)で育った。今川義元(いまがわよしもと)という大大名のもとでな。学問や礼儀(れいぎ)を学べたのは、よい面もあった。じゃが、自分の国に帰れぬ身は、やはり心細いものであったよ。"},
  {keys:["元服","げんぷく","義元","よしもと","今川義元"],
   a:"14さいのとき、駿府で元服(げんぷく、大人の仲間入り)をすませた。今川義元から「元」の一字をもらい「次郎三郎元信」と名のったのじゃ。これは、わしが今川の配下(はいか)になったしるしであった。じゃがいつか、自分の足で立つ日を、わしは夢見ておった。"},
  {keys:["辛抱","しんぼう","がまん","我慢","待つ","耐え","たえ"],
   a:"わしの一生は、まさに辛抱(しんぼう)の連続であった。人質の日々、強い敵にはさまれた苦しみ、家族を失う悲しみ……。じゃが、あせらず、時が来るのをじっと待った。「待つ」ことも、りっぱな戦いの一つよ。あきらめねば、道はかならず開ける。"},

  // ===== 家族 =====
  {keys:["妻","つま","正室","築山殿","つきやまどの","お嫁"],
   a:"わしの最初の妻は築山殿(つきやまどの)じゃ。今川義元のめいにあたる方でな。じゃが、のちに武田への内通(ないつう)をうたがわれ、つらい最期(さいご)をむかえることになる。戦国の世の、まことに悲しいさだめであった。"},
  {keys:["信康","のぶやす","長男","ちょうなん","嫡男","ちゃくなん","上の子"],
   a:"わしの長男は松平信康(まつだいらのぶやす)じゃ。勇かんで、ゆくゆくは頼もしいあとつぎになると思うておった。じゃが武田への内通をうたがわれ、わしは泣く泣く信康に切腹(せっぷく)を命じねばならなんだ。親が子を……これほどつらいことはない。生涯わすれられぬ痛みよ。"},
  {keys:["結城秀康","ゆうきひでやす","次男","じなん","秀康","ひでやす"],
   a:"わしの次男は結城秀康(ゆうきひでやす)じゃ。秀吉のもとへ養子(ようし)に出し、のちに結城家をつぎ、越前(えちぜん、いまの福井県)を治める大大名となった。子らをよその家へ出すのも、家どうしのつながりを保つためであったのよ。"},
  {keys:["秀忠","ひでただ","三男","さんなん","二代将軍","2代将軍","あとつぎ"],
   a:"わしのあとをついで二代将軍(しょうぐん)となったのは、三男の徳川秀忠(とくがわひでただ)じゃ。はなやかさはないが、まじめで堅実(けんじつ)な男での。新しくできた江戸幕府を、しっかりと固めてくれた。守りを固める役は、秀忠にこそふさわしかったのよ。"},
  {keys:["御三家","ごさんけ","尾張","紀伊","水戸","徳川の分家"],
   a:"わしは晩年(ばんねん)に生まれた子らに、特別な家をつくらせた。尾張(おわり)・紀伊(きい)・水戸(みと)の徳川家――これを「御三家(ごさんけ)」とよぶ。将軍家にあとつぎがなくなったときに、ここから次の将軍を出す。徳川の世が長く続くための、大切なそなえであった。"},
  {keys:["朝日姫","あさひひめ","継室","秀吉の妹","二人目の妻"],
   a:"秀吉と仲なおりしたとき、わしは秀吉の妹・朝日姫(あさひひめ)を妻にむかえた。家どうしを結ぶための結婚(政略結婚)じゃ。秀吉は妹だけでなく、自分の母までわしのもとへ人質として送ってきた。それほどまでに、わしと手を結びたかったのよ。"},
  {keys:["子だくさん","子どもの数","何人子ども","子が多い","子宝"],
   a:"わしには、男も女もあわせて多くの子がおった。子らは各地の大名に嫁(とつ)がせたり、養子に出したりしてな。血のつながりであちこちと手を結び、徳川の世を安定させたのじゃ。子は、家の未来をささえる大切な宝よ。"},

  // ===== 桶狭間・独立・清洲同盟 =====
  {keys:["桶狭間","おけはざま","今川義元の死","義元討たれ","兵糧","ひょうろう","大高城"],
   a:"桶狭間の戦い(1560年)では、わしはまだ今川方の武将であった。最前線で大高城(おおだかじょう)に兵糧(ひょうろう)を運びこむ、危険な役をまかされてな。ところが大将の今川義元が、織田信長に討たれてしもうた。これがわしの運命を、大きく変えたのじゃ。"},
  {keys:["独立","どくりつ","岡崎へ","大樹寺","だいじゅじ","捨城","岡崎城に戻"],
   a:"義元が討たれたのを機に、わしはついに今川から独立した。空(から)になった生まれ故郷・岡崎城に「捨て城(すてじろ)ならば拾(ひろ)おう」と入ってな。長い人質の身から、ようやく一人の大名として立ったのよ。この時のよろこびは、今も忘れぬ。"},
  {keys:["清洲同盟","きよす","信長と同盟","織田と手を","同盟を結"],
   a:"わしは1562年ごろ、織田信長と「清洲同盟(きよすどうめい)」を結んだ。これがすごいのは、二十年あまり、信長が本能寺でたおれるまで、けっして破れなかったことよ。約束を守りぬくこと――それが信用(しんよう)を生み、わしの力を大きくしたのじゃ。"},
  {keys:["信長","のぶなが","織田信長","信長との関係","信長くん"],
   a:"織田信長とは、長く手を結んだ仲じゃ。信長は新しいもの好きで、すばやく決断する人。わしは辛抱づよく守りを固める人。気性はちがえど、たがいをよく支えあった。信長がたおれたあと、その志(こころざし)を秀吉、そしてわしが受けついだのよ。"},

  // ===== 三河統一・家臣団 =====
  {keys:["三河一向一揆","いっこういっき","一揆","いっき","家臣が敵に"],
   a:"独立してまもなく、三河で「一向一揆(いっこういっき)」が起こった。仏の教えで結ばれた人々が刃向かい、なんと家臣の中にも一揆方につく者がおった。身内が二つに分かれる、苦しい戦いよ。じゃがこれをのりこえ、わしは三河をまとめる力をつけたのじゃ。"},
  {keys:["三河統一","三河をまとめ","三河平定","みかわとういつ"],
   a:"わしは一向一揆をしずめ、今川方の城を次々におさえ、1566年ごろに三河国をひとつにまとめあげた。まず足もとの故郷をしっかり固める――これが天下への、たしかな第一歩であった。あせらず、一歩ずつよ。"},
  {keys:["三河武士","みかわぶし","家臣","かしん","家来","けらい","部下","忠義","ちゅうぎ"],
   a:"わしのいちばんの宝は、忠義(ちゅうぎ)あつい三河武士(みかわぶし)たちじゃ。命をかけてわしを守り、貧しいときも文句ひとつ言わずついてきてくれた。強い武器や大きな城より、信じあえる家臣がいること――それが、わしのまことの強さであったのよ。"},
  {keys:["軍制","ぐんせい","旗本","はたもと","軍の仕組み"],
   a:"三河をまとめたわしは、軍の仕組みも整えた。西三河衆・東三河衆、そしてそば近くに仕える旗本(はたもと)――と役わりを分けてな。だれが何をするかをはっきりさせれば、いざ戦というとき、軍はよく動く。備(そな)えをおこたらぬのが、わしのやり方よ。"},

  // ===== 武田との戦い =====
  {keys:["武田信玄","たけだしんげん","信玄","しんげん","最強の敵"],
   a:"武田信玄(たけだしんげん)は、わしが生涯でもっとも恐れ、もっとも学んだ相手じゃ。「風林火山」の旗のもと、その軍はおそろしく強かった。わしは三方ヶ原で信玄に大敗したが、その戦いぶりから多くを学んだ。強い敵こそ、最良の先生なのよ。"},
  {keys:["三方ヶ原","みかたがはら","信玄に負け","大敗","負けた","ぼろ負け"],
   a:"三方ヶ原の戦い(1572年)は、わしの生涯でいちばんの大敗じゃ。武田信玄の強さの前に、たくさんの家臣を失い、わしも命からがら浜松城へ逃げ帰った。じゃが、この大きな負けが、わしを慎重(しんちょう)で辛抱づよい武将にしてくれた。負けからこそ、人は学ぶのよ。"},
  {keys:["しかみ像","しかみ","戒め","いましめ","負けの絵","こわい顔の絵"],
   a:"三方ヶ原で負けたあと、わしはこわばった、なさけない自分の顔を絵に描かせた、という話が伝わる。「しかみ像」とよばれる絵じゃ。負けたみじめな姿を、わざと手元に置いてな。「二度とこんな油断をするな」という、自分への戒め(いましめ)にしたのよ。"},
  {keys:["夏目","なつめ","身代わり","みがわり","家臣が守","逃がし"],
   a:"三方ヶ原でわしがあやういとき、家臣の夏目吉信(なつめよしのぶ)らが「殿はお逃げを」と、自ら身代わりとなって討ち死にしてくれた。わしが生きのびられたのは、こうした家臣の命のおかげよ。家臣の忠義を、わしは生涯わすれなんだ。"},
  {keys:["浜松城","はままつじょう","浜松","本拠地を移","居城"],
   a:"1570年、わしは本拠地を岡崎城から浜松城(はままつじょう)に移した。武田と向きあう前線(ぜんせん)に、自ら出て構えたのじゃ。岡崎城は長男の信康にまかせてな。浜松城は、わしが武田と戦い、力をたくわえた、ふんばりの城であったよ。"},
  {keys:["長篠","ながしの","武田勝頼","かつより","鉄砲","てっぽう"],
   a:"長篠の戦い(1575年)では、わしは信長とともに、信玄のあとをついだ武田勝頼(かつより)の軍と戦うた。さくをならべ、鉄砲を多くそろえて、強い武田の騎馬隊(きばたい)をやぶったのじゃ。新しい武器と工夫の前には、いかに強い軍もかなわぬ。時代が変わった一戦であった。"},
  {keys:["高天神城","たかてんじん","遠江","とおとうみ","城を取り返"],
   a:"遠江(とおとうみ)の高天神城(たかてんじんじょう)は、武田と取りあった大事な城じゃ。一度は武田に取られたが、まわりに小さな城をいくつも築いてじわじわ追いつめ、1581年にとうとう取り返した。あせらず、ゆっくり包囲して落とす――辛抱づよいわしらしい戦い方よ。"},
  {keys:["武田滅","武田氏ほろ","武田をほろ","甲斐","かい","勝頼の最期"],
   a:"1582年、わしは信長と力をあわせ、ついに武田氏をほろぼした。あれほど強かった武田勝頼も、天目山(てんもくざん)で自害(じがい)し、名門武田家はついえた。長年の強敵が消え、わしは駿河(するが)の国をほうびにもらった。じゃが、安心したのもつかの間であったのよ……。"},

  // ===== 信康事件 =====
  {keys:["信康事件","信康の切腹","築山殿の死","内通","ないつう","つらい決断","泣く泣く"],
   a:"1579年、妻の築山殿と長男の信康に、武田への内通(ないつう)のうたがいがかかった。わしは熟慮(じゅくりょ)のすえ、信長との同盟を守るため、二人を失う決断をした……。家族の命と、家の存続(そんぞく)。どちらも捨てがたい中での、断腸(だんちょう)の思いであった。"},
  {keys:["なぜ信康を","どうして信康","信康なぜ死","つらい選択","家族か同盟"],
   a:"なぜわが子を死なせたのか――今も学者の間で意見が分かれておる。信長の命令だったとも、わし自身と信康の考えがあわなかったとも言われる。たしかなのは、それがわしの生涯で最も重く、最も悲しい決断だったということよ。歴史には、答えの一つに決まらぬ問いもあるのじゃ。"},

  // ===== 本能寺〜伊賀越え =====
  {keys:["本能寺の変のとき","本能寺のとき","堺","さかい","信長が死んだとき","信長の死"],
   a:"1582年、信長が本能寺でたおれたとき、わしはわずかな供(とも)をつれて堺(さかい)を見物しておった。同盟相手の信長が急に討たれ、わし自身も命をねらわれかねぬ。生涯でも指おりの、あやうい瞬間であったよ。一時は、あとを追おうとさえ思うたほどじゃ。"},
  {keys:["伊賀越え","いがごえ","神君伊賀越え","逃げ帰","三河へ逃","命からがら"],
   a:"本能寺の変のあと、わしは「神君伊賀越え(しんくんいがごえ)」とよばれる、命がけの逃避行(とうひこう)をした。伊賀(いが)の険しい山道をこえ、わずかな家臣に守られて、ぶじ三河へもどったのじゃ。わしの生涯でも、最も危険な数日であった。家臣たちの働きに、ただただ感謝よ。"},
  {keys:["本多忠勝","ほんだただかつ","忠勝","ただかつ","蜻蛉切","とんぼぎり"],
   a:"本多忠勝(ほんだただかつ)は、わしの家臣でも一、二をあらそう猛将(もうしょう)じゃ。「蜻蛉切(とんぼぎり)」という長い槍(やり)を手に、生涯で五十回以上も戦に出ながら、かすり傷ひとつ負わなかったと伝わる。本能寺のあと、わしを正気にもどしてくれたのもこの忠勝よ。"},
  {keys:["服部半蔵","はっとりはんぞう","半蔵","忍者","にんじゃ","伊賀の者"],
   a:"服部半蔵(はっとりはんぞう)は、伊賀(いが)の者をたばねた、わしの家臣じゃ。伊賀越えのときは、地元の伊賀・甲賀(こうが)の者たちをまとめ、危険な山道をぶじにこえる手助けをしてくれた。江戸城の門に「半蔵門(はんぞうもん)」という名が今も残っておるぞ。"},
  {keys:["天正壬午","てんしょうじんご","甲斐信濃","五か国","5か国","領地が広","大大名に"],
   a:"信長の死後、主のいなくなった甲斐(かい)・信濃(しなの)をめぐって争いが起き(天正壬午の乱)、わしはこれを制した。これで三河・遠江・駿河・甲斐・信濃の五か国を治める大大名(だいだいみょう)となったのじゃ。混乱のときこそ、落ちついて動いた者が勝つのよ。"},

  // ===== 秀吉との関係 =====
  {keys:["小牧長久手","こまき","ながくて","秀吉と戦","秀吉に勝"],
   a:"1584年、わしは信長の次男・織田信雄(のぶかつ)と組み、豊臣秀吉と小牧・長久手(こまき・ながくて)で戦った。戦そのものではわしが優勢であったが、勝負はつかず和睦(わぼく)に。力でぶつかるより、おりあいをつけることもまた知恵(ちえ)。秀吉のしたたかさも、よう分かった戦いよ。"},
  {keys:["秀吉に従","臣従","しんじゅう","秀吉の家来","頭を下げ","上洛"],
   a:"小牧・長久手のあと、わしは秀吉に臣従(しんじゅう)し、その配下となった。プライドを捨ててでも、無用な戦をさけ、力をたくわえる――それがわしの選んだ道よ。「今は耐えどき」と見れば、頭を下げることもいとわぬ。それが生きのびる知恵なのじゃ。"},
  {keys:["大政所","おおまんどころ","秀吉の母","母を人質","人質を送"],
   a:"秀吉はわしを臣従させるため、自分の妹を妻にくれ、さらに実の母(大政所)まで人質としてわしのもとへ送ってきた。天下人(てんかびと)の秀吉が、そこまでして手を結びたがった――それほどわしの力を、秀吉は重く見ておったということよ。"},
  {keys:["五大老","ごたいろう","大老","たいろう","秀吉の重臣","政治をまかさ"],
   a:"秀吉の晩年(ばんねん)、わしは「五大老(ごたいろう)」という、天下の政(まつりごと)をあずかる五人の重臣の、その筆頭(ひっとう、いちばん上)となった。最も広い領地をもち、最も力のある大名としてな。秀吉なきあとの天下を動かす立場に、わしは静かに近づいていったのよ。"},
  {keys:["関東移封","かんとう","江戸","えど","領地を移","国替え","くにがえ","江戸に入"],
   a:"1590年、秀吉の命でわしは住みなれた東海から、関東(かんとう)へ国替(くにがえ)をさせられた。先祖代々の地をはなれるのはつらい。じゃが、わしはこれを好機(こうき)と見た。江戸(えど)というさびれた土地に入り、ここを天下の中心に育てあげたのじゃ。逆境(ぎゃっきょう)を力に変えたのよ。"},
  {keys:["江戸の町","えどのまち","町づくり","江戸を発展","開発","海をうめ"],
   a:"わしが入ったころの江戸は、湿地(しっち)の多いさびれた土地であった。じゃがわしは、川の流れを変え、海をうめ立て、水路(すいろ)を引いて、人の住みよい大きな町をつくっていった。この江戸が、のちに世界でも指おりの大都市に育つとはな。先を見すえて、土台を築いたのよ。"},
  {keys:["小田原","おだわら","北条","ほうじょう","小田原征伐"],
   a:"1590年、秀吉は関東の大名・北条氏(ほうじょうし)を、大軍でかこんでほろぼした(小田原征伐)。わしもこれに加わってな。この戦いのあと、わしは北条の旧領であった関東へ移されたのじゃ。秀吉による天下統一が、いよいよ仕上げに近づいた戦いであった。"},

  // ===== 関ヶ原 =====
  {keys:["秀吉の死","秀吉が死","ひでよし死","秀吉なきあと"],
   a:"1598年、天下人の秀吉がこの世を去った。あとには、まだ幼い子・秀頼(ひでより)が残された。天下は、ふたたびゆれはじめる。わしは五大老の筆頭として、ここで動くべきか、待つべきか――じっと時を見はかっておったのよ。"},
  {keys:["石田三成","いしだみつなり","三成","みつなり","関ヶ原の敵","西軍の大将"],
   a:"石田三成(いしだみつなり)は、秀吉につくした、まじめで義理がたい家臣じゃ。秀吉の死後、豊臣家を守ろうとして、わしに対する大名たちをまとめ、関ヶ原で西軍を率いて立ち向かってきた。敵ながら、その忠義(ちゅうぎ)は見あげたものであったよ。"},
  {keys:["関ヶ原","せきがはら","天下分け目","東軍","西軍","天下分目"],
   a:"関ヶ原の戦い(1600年)は、「天下分け目(てんかわけめ)」とよばれる大いくさじゃ。わしのひきいる東軍(とうぐん)と、石田三成らの西軍(せいぐん)が、岐阜県の関ヶ原でぶつかった。たった一日で決着がつき、わしが勝った。この勝利で、わしは天下人への道を、たしかなものにしたのよ。"},
  {keys:["関ヶ原勝因","なぜ勝","どうやって勝","裏切","内応","寝返り"],
   a:"関ヶ原でなぜ勝てたか。じつは戦の前から、わしは敵方の大名たちにこっそり手紙を送り、味方に引き入れる工作(こうさく)を重ねておった。戦がはじまると、その者たちが寝返り(ねがえり)、勝負は一気に決した。戦は、はじまる前にもう勝負がついている――辛抱づよい根回しの勝利よ。"},

  // ===== 将軍・江戸幕府 =====
  {keys:["征夷大将軍","せいいたいしょうぐん","将軍になっ","将軍に","しょうぐんに"],
   a:"1603年、わしは朝廷から征夷大将軍(せいいたいしょうぐん)に任じられた。武士のかしらとして、天下を治める正式な位じゃ。これにて江戸に幕府(ばくふ)を開いた。長い辛抱のすえ、わしはついに天下の頂(いただき)に立ったのよ。62さいのことであった。"},
  {keys:["江戸幕府","えどばくふ","幕府を開","幕府ひら","ばくふ"],
   a:"わしが江戸に開いた幕府(ばくふ)は、なんと約260年ものあいだ続いた。戦さの絶えなんだ世が、ここから長い平和の時代「天下泰平(てんかたいへい)」へと変わったのじゃ。人々が安心してくらせる世をつくること――それこそ、わしのいちばんの願いであったのよ。"},
  {keys:["将軍を譲","秀忠に譲","二年で","将軍をやめ","大御所","おおごしょ"],
   a:"わしは将軍になってわずか2年後の1605年、その位を息子の秀忠にゆずった。自分は「大御所(おおごしょ)」として、なお政(まつりごと)を後ろからささえてな。早く譲ったのには、大きなわけがあったのじゃ。さて、なぜだと思う？"},
  {keys:["なぜ譲","どうして譲","譲った理由","世襲","せしゅう","徳川が代々"],
   a:"なぜ将軍をすぐ秀忠に譲ったか。それはな、「将軍の位は、これから先ずっと徳川家が代々(だいだい)受けつぐのだ」と、天下にはっきり示すためよ。豊臣家にも、ほかの大名にも、「天下はもう徳川のものだ」と知らしめたのじゃ。先の先まで見すえた一手であった。"},
  {keys:["駿府","すんぷ","静岡","しずおか","晩年どこ","隠居"],
   a:"将軍を譲ったあと、わしは駿府(すんぷ、いまの静岡市)に移り住んだ。じつは、わしが幼いころ人質として過ごした、思い出の地でな。「大御所」として、ここから江戸の秀忠を見守り、天下の政を動かした。最期(さいご)もこの駿府で、静かにむかえたのじゃ。"},

  // ===== 大坂の陣 =====
  {keys:["大坂冬の陣","おおさかふゆ","冬の陣","ふゆのじん","大坂城をかこ"],
   a:"1614年、わしは豊臣秀頼(ひでより)のいる大坂城を大軍でかこんだ。「大坂冬の陣(ふゆのじん)」じゃ。大坂城はかたく、なかなか落ちぬ。そこでわしは、いったん和睦(わぼく)を結び、城の堀(ほり)をうめさせた。力ずくでなく、知恵で守りをくずす――辛抱づよいわしのやり方よ。"},
  {keys:["方広寺","ほうこうじ","鐘","かね","国家安康","こっかあんこう","言いがかり"],
   a:"大坂の陣のきっかけの一つが「方広寺(ほうこうじ)の鐘(かね)」じゃ。豊臣家がつくった鐘に「国家安康(こっかあんこう)」と刻まれておってな。これは「家康」の名を二つに切って呪(のろ)うものだ、とわしの側が問題にした。難くせ(なんくせ)とも言われるが、これも豊臣をくずすための一手であった。"},
  {keys:["真田","さなだ","幸村","ゆきむら","真田丸","信繁","のぶしげ"],
   a:"大坂の陣で、わしを最も苦しめた敵が真田幸村(さなだゆきむら、信繁)じゃ。「真田丸(さなだまる)」という出城(でじろ)を築いてわしの大軍を打ちやぶり、夏の陣ではわしの本陣めがけて突撃(とつげき)してきた。敵ながら、まことにあっぱれな武将であったよ。"},
  {keys:["大坂夏の陣","おおさかなつ","夏の陣","なつのじん","豊臣滅","とよとみほろ","秀頼","ひでより","淀殿"],
   a:"1615年、「大坂夏の陣(なつのじん)」でわしはついに大坂城を攻め落とした。豊臣秀頼(ひでより)とその母・淀殿(よどどの)は城とともにほろび、これにて豊臣家は絶えた。長く世を乱した戦さの種が、ここでついに消えたのじゃ。こうして天下は、まことに一つになった。"},

  // ===== 政策・治世 =====
  {keys:["幕藩体制","ばくはん","大名を治","大名のしくみ","国を治める仕組み"],
   a:"わしがつくった世の仕組みを「幕藩体制(ばくはんたいせい)」とよぶ。幕府が全国の大名をたばね、それぞれの大名が自分の領地(藩)を治める形じゃ。中心と地方のバランスをうまくとってな。この仕組みのおかげで、世は長く安定したのよ。"},
  {keys:["武家諸法度","ぶけしょはっと","大名のきまり","大名のルール","法度","はっと"],
   a:"わしは大名たちが守るべききまり「武家諸法度(ぶけしょはっと)」を定めた。城を勝手につくってはならぬ、無断で結婚してはならぬ……などのきまりじゃ。大名の力が大きくなりすぎぬようにおさえ、ふたたび戦が起こらぬようにしたのよ。平和を保つための、大切なきまりであった。"},
  {keys:["公家","くげ","朝廷","ちょうてい","天皇","てんのう","禁中並公家諸法度"],
   a:"わしは天皇や公家(くげ)についても、守るべききまり「禁中並公家諸法度(きんちゅうならびにくげしょはっと)」を定めた。朝廷とはあらそわず、敬(うやま)いながらも、その役わりをきちんと決めてな。古いものを大切にしつつ、新しい世の秩序(ちつじょ)を整えたのじゃ。"},
  {keys:["朱印船","しゅいんせん","貿易","ぼうえき","外国と商売","海外"],
   a:"わしは「朱印状(しゅいんじょう)」という、海外との商売を許す証明書を出し、外国との貿易(ぼうえき)をさかんにした(朱印船貿易)。海のむこうから珍しい品が入り、国も豊かになる。平和な世をつくるには、戦さの強さだけでなく、商売の力も大事なのよ。"},
  {keys:["三浦按針","みうらあんじん","ウィリアム","アダムス","外国人","イギリス","西洋人"],
   a:"わしは、海でそうなんしてきたイギリス人ウィリアム・アダムスを家臣にとりたて、「三浦按針(みうらあんじん)」という名をあたえた。世界のことや、進んだ船・大砲(たいほう)づくりを教わってな。生まれや国にこだわらず、役立つ者は登用(とうよう)する。それがわしの考えよ。"},
  {keys:["学問","がくもん","林羅山","はやしらざん","儒学","じゅがく","朱子学","学者"],
   a:"わしは学問をたいへん重んじ、林羅山(はやしらざん)という学者をそば近くに用いた。武力だけでは、世はおさまらぬ。礼儀(れいぎ)や道理(どうり)を学ぶ学問でこそ、人の心はおさまる。戦の世を終わらせ、学びの世をひらく――それがわしの願いであった。"},
  {keys:["天下泰平","てんかたいへい","平和な世","へいわ","戦のない世","260年"],
   a:"わしがつくった江戸の世は、約260年もの長きにわたって、大きな戦のない「天下泰平(てんかたいへい)」が続いた。これは世界の歴史でもめずらしいことよ。戦いに勝つことより、戦いのいらぬ世をつくること――それこそが、わしの本当の目標であったのじゃ。"},

  // ===== 死・神格化 =====
  {keys:["死","しんだ","亡くな","最期","さいご","いつ死","死去","享年","何歳で死","数え75"],
   a:"わしは1615年に天下を一つにまとめあげ、その翌年の1616年、駿府(すんぷ)で静かに世を去った。数(かぞ)えで75さい――戦国の武将としては、たいそうな長生きであった。長く辛抱し、長く生きたからこそ、最後に天下を手にできたのよ。"},
  {keys:["死因","しいん","なぜ死","病気","てんぷら","鯛","たい","食あたり"],
   a:"わしの死因はな、好物の鯛(たい)の天ぷらを食べてあたった、という話が有名じゃ。じゃが本当は、胃のあたりの病(やまい)だったのではないか、と今の学者は考えておる。あれほど健康に気をつけたわしでも、寄る年波(としなみ)には勝てなんだのよ。"},
  {keys:["日光","にっこう","東照宮","とうしょうぐう","お墓","おはか","久能山","くのうざん","まつられ"],
   a:"わしのなきがらは、まず駿河の久能山(くのうざん)にほうむられ、のちに下野(しもつけ、いまの栃木県)の日光(にっこう)へ移された。それが「日光東照宮(にっこうとうしょうぐう)」じゃ。きらびやかな社(やしろ)でな、今も多くの人がおとずれる。世界遺産(せかいいさん)にもなっておるぞ。"},
  {keys:["東照大権現","とうしょうだいごんげん","神になっ","神様","かみさま","ごんげん"],
   a:"わしは死んだのち、「東照大権現(とうしょうだいごんげん)」という神(かみ)としてまつられた。「東(東国)を照らす神」という意味よ。江戸の世を守る守り神となったのじゃ。一人の人間が、辛抱と努力のすえに天下をとり、ついには神とまでなる――おどろきの一生であろう。"},
  {keys:["遺訓","いくん","遺言","ゆいごん","人の一生は重荷","名言","めいげん","ことば"],
   a:"わしの言葉として「人の一生は、重荷(おもに)を負(お)うて遠き道を行くがごとし。いそぐべからず」と伝わる。人生は重い荷物をせおって長い道を歩むようなもの。あせらず、一歩ずつ進めよ――そんな意味じゃ。辛抱づよく生きたわしらしい言葉であろう。"},

  // ===== 性格・人となり =====
  {keys:["性格","せいかく","どんな人","人がら","ひとがら","どういう人"],
   a:"わしか？　とにかく辛抱(しんぼう)づよく、慎重(しんちょう)で、けっしてあせらぬ。チャンスが来るまで、何年でもじっと待つ。倹約(けんやく)家で、健康にも気をつかった。はでさはないが、こつこつと土台を固める――そういう男よ。最後に笑うのは、辛抱づよい者なのじゃ。"},
  {keys:["ほととぎす","ホトトギス","鳴くまで待","鳴かぬなら","信長秀吉とちがい","三人のちがい"],
   a:"後の世の人が、わしら三人の気性を、鳴かないホトトギスにたとえた歌がある。信長は「鳴かぬなら殺してしまえ」、秀吉は「鳴かせてみせよう」、そしてわしは「鳴くまで待とう」――とな。作り話じゃが、辛抱づよく時を待つわしの気性を、みごとに言いあてておるのう。"},
  {keys:["三英傑","さんえいけつ","信長秀吉家康","三人","信長と秀吉と"],
   a:"信長・秀吉・そしてわし家康――この三人は「三英傑(さんえいけつ)」とよばれる。信長が天下統一の道を切りひらき、秀吉がそれをなしとげ、そしてわしが、長く続く平和な世(江戸幕府)をつくった。三人の力で、戦国の世を終わらせたとも言えるのよ。"},
  {keys:["健康","けんこう","薬","くすり","健康オタク","長生きの秘訣","薬を作"],
   a:"わしは、たいそう健康に気をつかう男であった。自分で薬草(やくそう)を調べ、薬を調合(ちょうごう)して飲んだほどでな。「天下をとるには、まず長生きすること」と考えておったのじゃ。げんに、ライバルたちより長く生き、最後に天下を手にした。健康こそ、最大の武器よ。"},
  {keys:["食べ物","たべもの","食事","しょくじ","好物","こうぶつ","麦飯","むぎめし","何を食べ"],
   a:"わしの食事は、いたって質素(しっそ)であった。ぜいたくをきらい、ふだんは白米でなく、体によい麦飯(むぎめし)を好んで食べた。天下人になっても、その質素な習慣を変えなんだ。食べ物に気をつけることも、長生きの大事なひけつなのじゃ。"},
  {keys:["倹約","けんやく","けち","節約","せつやく","お金を大事","ぜいたくしない"],
   a:"わしは「けち」と言われるほどの倹約(けんやく)家であった。むだづかいをきらい、お金や物を大切にした。じゃが、いざ大事なところには、おしみなく使うた。ふだんしまつをして力をたくわえ、ここぞというときに使う――それが家を栄えさせるこつなのよ。"},
  {keys:["趣味","しゅみ","好き","すき","鷹狩り","たかがり","鷹","たか"],
   a:"わしのいちばんの楽しみは、鷹狩り(たかがり)じゃ。鷹をはなって獲物(えもの)をとらせる、勇ましくも風流(ふうりゅう)な遊びでな。じつは野山をかけまわるよい運動にもなり、健康にも、頭をすっきりさせるにもよかった。一石二鳥(いっせきにちょう)の楽しみであったよ。"},
  {keys:["水泳","すいえい","泳ぎ","およぎ","乗馬","じょうば","馬","うま","運動"],
   a:"わしは年をとっても、泳ぎや乗馬(じょうば)をかかさなんだ。体を動かしてきたえることが、長生きの秘訣(ひけつ)と心得ておったのじゃ。武芸(ぶげい)もはげみ、いざというとき自分の身を守れるようにもしておった。健康と備え――どちらも、おこたらぬのがわしよ。"},
  {keys:["読書","どくしょ","本","ほん","勉強","学ぶの好き","書物"],
   a:"わしは本を読むのが大すきでな。むかしの戦(いくさ)の記録や、政(まつりごと)の書物を熱心に学んだ。古い書物を集め、写させ、後の世に伝えもした。過去から学ぶ者は、過ちをくり返さぬ。読書は、わしにとって最高の先生であったよ。"},
  {keys:["長生き","ながいき","何歳まで","75","75歳","75さい","寿命"],
   a:"わしは数えで75さいまで生きた。信長は49さい、秀吉は数えで62さいで世を去ったゆえ、わしは三英傑でいちばんの長生きじゃ。あせらず、健康に気をつかい、辛抱づよく待ちつづけたからこそ、最後に天下を手にできた。長生きは、それ自体が大きな力なのよ。"},
  {keys:["見た目","みため","顔","かお","太","ふと","体型","姿","しょうぞう","肖像画"],
   a:"わしは年をとってから、ふくよかな体つきになったと伝わる。じっさい、ふとっていたらしい。じゃが若いころは、戦場をかけまわる引きしまった武将であった。残された肖像画(しょうぞうが)を見ると、どっしりと落ちついた、たのもしい姿に描かれておるぞ。"},
  {keys:["爪","つめ","噛む","かむ","くせ","緊張","きんちょう"],
   a:"わしには、考えごとや心配ごとがあると、爪(つめ)を噛(か)んでしまうくせがあった、と伝わる。あの辛抱づよいわしでも、心の中ではいろいろと思いなやんでおったのじゃ。冷静(れいせい)に見えても、人にはみな、かくれたくせや弱さがあるものよのう。"},

  // ===== 家臣 =====
  {keys:["四天王","してんのう","徳川四天王","強い家臣","名臣"],
   a:"わしには「徳川四天王(してんのう)」とよばれる、とくにすぐれた四人の家臣がおった。酒井忠次(さかいただつぐ)、本多忠勝(ほんだただかつ)、榊原康政(さかきばらやすまさ)、井伊直政(いいなおまさ)じゃ。みな命がけでわしを支えてくれた。よき家臣にめぐまれたことが、わしの何よりの幸運よ。"},
  {keys:["井伊直政","いいなおまさ","直政","なおまさ","赤備え","あかぞなえ","井伊の赤"],
   a:"井伊直政(いいなおまさ)は、四天王の中でも若くしてめきめき頭角(とうかく)をあらわした将じゃ。よろいや旗をすべて赤でそろえた「井伊の赤備え(あかぞなえ)」は、敵におそれられた。その勇ましい部隊は、戦場でひときわ目立ったものよ。たのもしい男であった。"},
  {keys:["榊原康政","さかきばらやすまさ","康政","やすまさ"],
   a:"榊原康政(さかきばらやすまさ)も、四天王の一人じゃ。若いころからわしに仕え、数々の戦で手柄(てがら)を立てた。武勇(ぶゆう)だけでなく、頭もよくはたらく男でな。わしの天下取りを、力のかぎりささえてくれた、忠義あつい将であったよ。"},
  {keys:["酒井忠次","さかいただつぐ","忠次","ただつぐ","家臣のかしら","筆頭"],

// 入力にいちばん合う答えをさがす
function findAnswer(text){
  const t = (text||"").replace(/\s/g,"");
  if(!t) return null;
  let best=null, bestScore=0;
  for(const item of KB){
    let score=0;
    for(const k of item.keys){ if(t.includes(k)) score += k.length; }
    if(score>bestScore){bestScore=score; best=item;}
  }
  return bestScore>0 ? best.a : null;
}

// ===== タイプライター表示 =====
const answerEl = document.getElementById('answer');
const faceEl = document.getElementById('face');
let typing=null;

function speak(text, mood){
  faceEl.classList.remove('talk','seikai','zannen'); void faceEl.offsetWidth;
  faceEl.classList.add(mood || 'talk');
  if(typing) clearInterval(typing);
  answerEl.innerHTML="";
  let i=0;
  const cursor=document.createElement('span');
  cursor.className='cursor'; cursor.textContent='　';
  answerEl.appendChild(cursor);
  typing=setInterval(()=>{
    if(i>=text.length){clearInterval(typing); cursor.remove(); return;}
    const ch=document.createTextNode(text[i]);
    answerEl.insertBefore(ch,cursor);
    i++;
  },32);
}

function handleAsk(text){
  const a = findAnswer(text);
  if(a){ speak(a); }
  else{ speak(NOT_FOUND[Math.floor(Math.random()*NOT_FOUND.length)]); }
}

const MARKS=["一","二","三"];

let quizState={order:[],pos:0,right:0,done:0,finished:false};
const choicesEl=document.getElementById('choices');
const quizNextEl=document.getElementById('quizNext');
const quizCountEl=document.getElementById('quizCount');
const quizRightEl=document.getElementById('quizRight');
const quizDoneEl=document.getElementById('quizDone');

function shuffle(n){const a=[...Array(n).keys()];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  quizState={order:shuffle(QUIZ.length),pos:0,right:0,done:0,finished:false};
  updateScore();
  showQuestion();
}
function updateScore(){quizRightEl.textContent=quizState.right;quizDoneEl.textContent=quizState.done;}

function showQuestion(){
  const item=QUIZ[quizState.order[quizState.pos]];
  quizCountEl.textContent="第"+(quizState.pos+1)+"問 ／ 全"+QUIZ.length+"問";
  speak("【もんだい】"+item.q);
  choicesEl.innerHTML="";
  const disp=shuffle(item.c.length); // 選択肢の表示順（中身もシャッフル）
  disp.forEach((origIdx,k)=>{
    const b=document.createElement('button');
    b.className='choice';
    b.innerHTML='<span class="mark">'+MARKS[k]+'</span>'+item.c[origIdx];
    b.dataset.correct=(origIdx===item.ans)?"1":"0";
    b.onclick=()=>chooseAnswer(b,item);
    choicesEl.appendChild(b);
  });
  quizNextEl.classList.remove('show');
}

function chooseAnswer(clicked,item){
  const isRight=clicked.dataset.correct==="1";
  choicesEl.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    if(b.dataset.correct==="1"){b.classList.add('correct');b.querySelector('.mark').textContent='○';}
    else if(b===clicked){b.classList.add('wrong');b.querySelector('.mark').textContent='✕';}
  });
  quizState.done++;
  if(isRight){quizState.right++;speak("あっぱれ！　"+item.e,'seikai');}
  else{speak("むむ、ざんねん。正しくは「"+item.c[item.ans]+"」じゃ。"+item.e,'zannen');}
  updateScore();
  if(quizState.pos>=quizState.order.length-1){
    quizState.finished=true;
    quizNextEl.textContent="けっか発表 ▶";
  }else{
    quizNextEl.textContent="つぎの問題へ ▶";
  }
  quizNextEl.classList.add('show');
}

quizNextEl.onclick=()=>{
  if(quizState.finished){
    const r=quizState.right,n=QUIZ.length;
    let msg;
    if(r===n) msg="天下無双じゃ！　全問正解、みごとであった！";
    else if(r>=n*0.7) msg="あっぱれ、なかなかの戦国通じゃな！";
    else if(r>=n*0.4) msg="うむ、よう学んだ。あせらず、あと一息よ。";
    else msg="これからじゃ。辛抱づよく、もう一度いどんでみよ！";
    speak("【けっか】全"+n+"問のうち、"+r+"問せいかい！　"+msg,'seikai');
    choicesEl.innerHTML="";
    quizNextEl.textContent="もう一度いどむ ▶";
    quizState.finished=false;
    quizState.restart=true;
    return;
  }
  if(quizState.restart){quizState.restart=false;startQuiz();return;}
  quizState.pos++;
  showQuestion();
};

  {y:"1542年",age:"0さい",t:"誕生",d:"わしは1542年、三河国(いまの愛知県)の岡崎城に生まれた。父は松平広忠、母は於大の方じゃ。松平家のあとつぎとして世に生をうけたのよ。"},

  {y:"1560年",age:"18さいごろ",t:"桶狭間の戦い・独立",d:"今川方として桶狭間で戦うさなか、大将の今川義元が織田信長に討たれた。これを機にわしは今川から独立し、生まれ故郷の岡崎城に入った。ようやく一人の大名として立ったのよ。"},
  {y:"1562年",age:"20さいごろ",t:"清洲同盟",d:"織田信長と「清洲同盟」を結んだ。これが信長の死まで二十年あまり破れなかった。約束を守りぬくことが信用を生み、わしの力を大きくしたのじゃ。"},
  {y:"1570年",age:"28さいごろ",t:"浜松城へ移る",d:"本拠地を岡崎城から浜松城に移し、武田と向きあう前線に自ら構えた。岡崎城は長男の信康にまかせてな。ここで力をたくわえたのよ。"},
  {y:"1572年",age:"30さいごろ",t:"三方ヶ原の戦い",d:"武田信玄に大敗した、生涯いちばんの負けいくさじゃ。多くの家臣を失い、命からがら逃げ帰った。じゃがこの大敗が、辛抱づよいわしをつくってくれた。"},
  {y:"1575年",age:"33さいごろ",t:"長篠の戦い",d:"信長とともに、武田勝頼の軍と戦うた。鉄砲を多くそろえ、強い武田の騎馬隊をやぶった。新しい武器と工夫が、いくさを変えた一戦よ。"},
  {y:"1579年",age:"37さいごろ",t:"信康事件",d:"妻・築山殿と長男・信康に武田への内通のうたがいがかかり、わしは二人を失う決断をした……。家の存続のための、断腸の思いであった。生涯わすれられぬ痛みよ。"},
  {y:"1582年",age:"40さいごろ",t:"本能寺の変・神君伊賀越え",d:"信長が本能寺でたおれたとき、わしはわずかな供で堺におった。命をねらわれながら、伊賀の山道をこえてぶじ三河へ逃げ帰った。生涯でも最も危険な数日であった。"},
  {y:"1584年",age:"42さいごろ",t:"小牧・長久手の戦い",d:"豊臣秀吉と小牧・長久手で戦うた。戦では優勢であったが勝負はつかず、和睦にいたった。のちにわしは秀吉に臣従する。今は耐えどき、と見たのよ。"},
  {y:"1590年",age:"48さいごろ",t:"関東へ移る（江戸入り）",d:"秀吉の命で、住みなれた東海から関東へ国替えとなった。さびれた江戸に入り、ここを天下の中心に育てあげた。逆境を力に変えたのじゃ。"},
  {y:"1600年",age:"58さいごろ",t:"関ヶ原の戦い",d:"「天下分け目」の関ヶ原で、東軍を率いて石田三成らの西軍に勝った。たった一日の決着での。この勝利で天下人への道をたしかなものにしたのよ。"},
  {y:"1603年",age:"61さいごろ",t:"征夷大将軍・江戸幕府",d:"朝廷から征夷大将軍に任じられ、江戸に幕府を開いた。長い辛抱のすえ、ついに天下の頂に立った。この幕府は約260年も続くことになる。"},
  {y:"1605年",age:"63さいごろ",t:"将軍を秀忠に譲る",d:"わずか2年で将軍の位を息子の秀忠にゆずり、自らは大御所として後ろからささえた。「天下は代々徳川が継ぐ」と世に示すための一手であった。"},
  {y:"1615年",age:"73さいごろ",t:"大坂の陣・豊臣滅亡",d:"大坂の陣で豊臣氏をほろぼし、長く世を乱した戦さの種をついに断った。こうして天下は、まことに一つになったのじゃ。"},
  {y:"1616年",age:"75さい",t:"死去・東照大権現",d:"駿府で静かに世を去った。数えで75さい、戦国の武将としては長生きであった。死後は「東照大権現」という神としてまつられ、江戸の世を守ったのよ。"}
];
const timelineEl=document.getElementById('timeline');
function renderTimeline(){
  timelineEl.innerHTML="";
  TIMELINE.forEach((ev)=>{
    const d=document.createElement('div');
    d.className='tl-item';
    d.innerHTML='<div class="tl-year">'+ev.y+'</div><div class="tl-age">'+ev.age+'</div><div class="tl-title">'+ev.t+'</div>';
    d.onclick=()=>{
      timelineEl.querySelectorAll('.tl-item').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
      speak("【"+ev.y+"・"+ev.t+"】"+ev.d);
    };
    timelineEl.appendChild(d);
  });
}
renderTimeline();

// 参考のため、関ヶ原・大坂・京も薄く点で示す
const REF_PLACES=[
  {name:"関ヶ原",x:452,y:678},
  {name:"京",x:388,y:700},
  {name:"大坂",x:379,y:732}
];

const mapWrap=document.getElementById('mapWrap');
const mapSteps=document.getElementById('mapSteps');
// 中部〜関東・近畿が大きく見える表示範囲
const MAP_VIEWBOX="350 600 320 200";
let mapBuilt=false;

function buildMap(){
  if(mapBuilt) return;
  mapBuilt=true;
  mapWrap.innerHTML=JAPAN_SVG;
  const svg=document.getElementById('japanMapSvg');
  svg.setAttribute('viewBox',MAP_VIEWBOX);
  svg.removeAttribute('width'); svg.removeAttribute('height');

  // 各県に地方区分を付け、家康時代の色分け（ゆかりの国を強調）
  const prefByCode={};
  PREFECTURES.forEach(p=>{prefByCode[p.code]=p;});
  svg.querySelectorAll('.prefecture').forEach(el=>{
    const code=+el.dataset.code;
    const p=prefByCode[code];
    if(p) el.setAttribute('data-region',p.region);
  });

  // ルート線（番号順に結ぶ）
  const NS="http://www.w3.org/2000/svg";
  const route=document.createElementNS(NS,'polyline');
  route.setAttribute('class','map-route');
  route.setAttribute('points',PLACES.map(p=>p.x+","+p.y).join(" "));
  svg.appendChild(route);

  // 参考地点
  REF_PLACES.forEach(r=>{
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',r.x); c.setAttribute('cy',r.y); c.setAttribute('r',2.6);
    c.setAttribute('class','ref-dot');
    svg.appendChild(c);
    const t=document.createElementNS(NS,'text');
    t.setAttribute('x',r.x); t.setAttribute('y',r.y-4);
    t.setAttribute('class','ref-name'); t.textContent=r.name;
    svg.appendChild(t);
  });

  // ピン
  PLACES.forEach((p,i)=>{
    const dy=(p.no===5)?14:-9; // 2番目と5番目の駿府が重なるのでラベルを上下に分ける
    const g=document.createElementNS(NS,'g');
    g.setAttribute('class','map-pin');
    g.dataset.idx=i;
    g.innerHTML=
      '<circle class="pin-dot" cx="'+p.x+'" cy="'+p.y+'" r="6"></circle>'+
      '<text class="pin-num" x="'+p.x+'" y="'+p.y+'">'+p.no+'</text>'+
      '<text class="pin-name" x="'+p.x+'" y="'+(p.y+dy)+'">'+p.label+'</text>';
    g.addEventListener('click',()=>selectPlace(i));
    svg.appendChild(g);
  });

  // 下の札
  mapSteps.innerHTML="";
  PLACES.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='map-step';
    b.innerHTML='<span class="step-no">'+p.no+'</span>'+p.label;
    b.onclick=()=>selectPlace(i);
    mapSteps.appendChild(b);
  });
}
function selectPlace(idx){
  const p=PLACES[idx];
  mapWrap.querySelectorAll('.map-pin').forEach((g,i)=>g.classList.toggle('active',i===idx));
  Array.from(mapSteps.children).forEach((b,i)=>b.classList.toggle('active',i===idx));
  speak("【"+p.no+"・"+p.label+"】"+p.d);
}


// ===== モード切り替え =====
const QA_INTRO="もんどうの間じゃ。下のますに聞きたいことを入力して、わしにたずねるがよい。あせらず、なんでも答えてやろうぞ。";
const QUIZ_INTRO="では、家康クイズじゃ！　下の三つから、正しいと思うものをえらぶがよい。あせらず、みなで考えてみよ。";
const TL_INTRO="これがわしの一生の年表じゃ。下の札をタップすれば、そのできごとをわしが語って聞かせよう。";
const MAP_INTRO="これは、わしが住んだ土地のうつりかわりを示した地図じゃ。番号の順に住まいを移していった。札か地図の印をタップしてみよ。";
const panels={
  qa:document.getElementById('panel-qa'),
  quiz:document.getElementById('panel-quiz'),
  timeline:document.getElementById('panel-timeline'),
  map:document.getElementById('panel-map')
};
let curMode='qa';
function setMode(mode){
  if(mode===curMode && mode!=='quiz') return;
  curMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  Object.keys(panels).forEach(k=>panels[k].classList.toggle('show',k===mode));
  if(mode==='qa'){speak(QA_INTRO);}
  else if(mode==='quiz'){speak(QUIZ_INTRO);setTimeout(()=>{if(curMode==='quiz')startQuiz();},1600);}
  else if(mode==='timeline'){speak(TL_INTRO);}
  else if(mode==='map'){buildMap();speak(MAP_INTRO);}
}
document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick=()=>setMode(b.dataset.mode);
});

speak(GREET);
